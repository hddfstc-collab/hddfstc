                                                const targetNotices = (notices || []).filter(n =>
                                                    app.actionType === 'widget_notices' || String(n.appId) === String(app.id)

                                                const appPosts = (dynamicPosts || []).filter(p => String(p.appId) === String(app.id));

                                                setShowNewPostPopup(false);
                                            }}

                                            <div className="flex items-center gap-2 mb-1">

                                                    {app.name}

                                            </div>
                                            <p className="text-[10px] text-stone-500 dark:text-stone-400 ml-4">

                                            </p>
                                        </button>
                                    ))}

                                    </button>
                                </div>

                                    <button onClick={() => setViewMode('daily')} className={`flex flex-col items-center gap-1.5 transition-colors w-12 sm:w-14 mt-2 mb-2 ${viewMode === 'daily' ? 'text-teal-700 dark:text-teal-400 scale-110 drop-shadow-md' : 'text-stone-500'}`}><Icon name="calendar" size={24} /><span className="text-[10px] tracking-tighter">일간</span></button>

                                    <button onClick={() => setViewMode('event')} className={`relative flex flex-col items-center gap-1.5 transition-colors w-12 sm:w-14 mt-2 mb-2 ${viewMode === 'event' ? 'text-rose-600 dark:text-rose-400 scale-110 drop-shadow-md' : 'text-stone-500'}`}><div className={currentEvent?.status === 'waiting' ? 'animate-bounce text-amber-500' : ''}><Icon name="gift" size={24} />{currentEvent?.status === 'waiting' && <div className="absolute top-0 right-2 w-2.5 h-2.5 bg-rose-500 rounded-full border-2 border-[#F9F8F6] dark:border-stone-900"></div>}</div><span className="text-[10px] tracking-tighter">이벤트</span></button>
                                    <button onClick={() => setViewMode('admin')} className={`flex flex-col items-center gap-1.5 transition-colors w-12 sm:w-14 mt-2 mb-2 ${viewMode === 'admin' ? 'text-teal-700 dark:text-teal-400 scale-110 drop-shadow-md' : 'text-stone-500'}`}><Icon name="settings" size={24} /><span className="text-[10px] tracking-tighter">관리</span></button>
                                </nav>
                            )
                        }

                            isNoticeModalOpen && (
                                <ModalWrapper title="공지사항 작성" icon="edit" color="text-rose-500" zIndex={160} onClose={() => { setIsNoticeModalOpen(false); setEditingNoticeId(null); setNoticeForm({ content: '', photos: [], isPinned: false }); }}>

                                        <div className="flex items-center justify-between gap-3">

                                                <Icon name="camera" size={14} className="text-stone-500" />
                                                {noticeForm.photos?.length === 0

                                            </label>

                        {

                                        {(() => {
                                            const operatorId = openedReservationApp.resOperatorId; const operatorName = userMap[operatorId]?.name || '담당자 미지정'; const opSched = scheduleMap[operatorId]?.[resSelectedDate]?.status;

                                            const dayRes = (dynamicPosts || []).filter(p => p.appId === openedReservationApp.id && p.type === 'reservation' && p.resDate === resSelectedDate); const timeSlots = (openedReservationApp.resTimeSlots || '10:00,11:00').split(',').map(t => t.trim()); const maxPerSlot = openedReservationApp.resMaxPerSlot || 1; const leadTimeMs = ((openedReservationApp.resLeadTimeDays || 0) * 24 + (openedReservationApp.resLeadTimeHours || 0)) * 60 * 60 * 1000; const now = new Date(); const [y, m, d] = resSelectedDate.split('-');
                                            return (

                                                    <div className="grid grid-cols-2 gap-3">

                                                            const nowTs = now.getTime();
                                                            const slotTs = slotTime.getTime();

                                                            const isPast = slotTs < nowTs;
                                                            const isDeadlinePassed = slotTs - leadTimeMs <= nowTs;

                                                            const currentSlotRes = dayRes.filter(r => r.resTime === time);
                                                            const isFull = currentSlotRes.length >= maxPerSlot;

                                                            const myRes = currentSlotRes.find(r =>

                                                            const isResAdmin =

                                                                    onClick={() => {

                                                                        const isResAdmin = isAdminAuth || (appUser && appUser.empId === openedReservationApp?.resOperatorId);

                                                                            if (isFull) return showToast('마감되었습니다.', true); // 👈 여기서 return이 확실히 작동해야 창이 안 뜹니다.
                                                                            return; // 기타 비활성화 상태 시 중단
                                                                        }

                                                                        // 4️⃣ 위 조건들을 모두 통과했을 때만 예약 입력창 오픈
                                                                        setResPrompt(time);
                                                                    }}

                                                                            <Icon name="checkCircle" size={12} />
                                                                        </div>

                                                                            ? 'text-teal-700 dark:text-teal-400'

                                                                        className={`text-[10px] font-bold mt-1 ${myRes

                                                                            : isDisabled

                                                                            }`}
                                                                    >
                                                                        {myRes

                                                                            : isPast

                                                                                    ? '마감됨'
                                                                                    : isFull
                                                                                        ? '예약 꽉참'
                                                                                        : `예약 가능 (${currentSlotRes.length}/${maxPerSlot})`}
                                                                    </p>

                                                                    {/* 관리자: 슬롯 내 예약 전부 취소 */}

                                                                                        취소

                                                                                </div>

                                                                    {!isResAdmin && myRes && (

                                                                        >
                                                                            예약 취소
                                                                        </button>
                                                                    )}

                                                                    {/* 비로그인: 성명 입력으로 취소 */}
                                                                    {!isLoggedIn && currentSlotRes.length > 0 && (
                                                                        <button
                                                                            onClick={e => {
                                                                                e.stopPropagation();
                                                                                setCancelGuestInfo({ posts: currentSlotRes });
                                                                                setCancelGuestName('');
                                                                            }}
                                                                            className="w-full mt-2 text-[9px] font-black text-rose-500 hover:underline"
                                                                        >
                                                                            예약 취소 (비회원)
                                                                        </button>
                                                                    )}
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            );
                                        })()}
                                    </div>
                                </ModalWrapper>
                            )
                        }

                        {

                                            <p className="text-[12px] font-black text-indigo-700 dark:text-indigo-300">[{resSelectedDate} / {resPrompt}]</p>

                                                    onChange={e => setResInput({ ...resInput, password: e.target.value.replace(/[^0-9]/g, '') })}
                                                />
                                            </div>

                                    <div className="flex gap-2 mt-6 pt-2 border-t border-stone-100 dark:border-stone-800">

                                        {/* 🔑 비밀번호 입력 칸 */}
                                        <input

                                            inputMode="numeric"
                                            maxLength="4"
                                            className="w-full bg-stone-50 dark:bg-stone-800 border border-stone-200 dark:border-stone-700 rounded-2xl px-5 py-4 text-center text-xl font-black tracking-widest outline-none focus:border-rose-500"

                                        <div className="flex gap-2">
                                            <button
                                                onClick={() => { setCancelGuestInfo(null); setCancelGuestPassword(''); }}
                                                className="flex-1 bg-stone-200 dark:bg-stone-800 text-stone-600 dark:text-stone-300 font-black py-3 rounded-xl btn-press text-xs"
                                            >
                                                닫기
                                            </button>

                                            <button
                                                onClick={(e) => {
                                                    e.preventDefault();
                                                    e.stopPropagation();

                                                    // 🧐 비밀번호 검증 로직

                                                    const targetPost = cancelGuestInfo.posts[0];

                                                        cancelGuestInfo.posts.forEach(p => {

                                                </div>
                                                <button onClick={async () => {

                                                    const targetEmpId = profileForm.targetEmpId || appUser.empId;
                                                    const originalUser = users.find(u => u.empId === targetEmpId);
                                                    const pwHash = await hashPassword(profileForm.password);

                                                    setUsers((users || []).map(u => u.empId === targetEmpId ? updatedUser : u));
                                                    saveToIDB('users', updatedUser);
                                                    if (appUser && appUser.empId === targetEmpId) setAppUser(updatedUser);

                                                    setProfileForm({ ...profileForm, password: '' });

                                        {profileTab === 'info' && (

                                                <div><label className="text-[10px] font-black text-stone-500 ml-2">소속 파트</label><input className="w-full mt-1 bg-white dark:bg-stone-800 border border-stone-100 dark:border-stone-700 rounded-2xl px-5 py-4 text-xs font-bold outline-none focus:border-teal-500 transition-colors" value={profileForm.part} onChange={e => setProfileForm({ ...profileForm, part: e.target.value })} /></div>
                                                <div><label className="text-[10px] font-black text-stone-500 ml-2">담당 카테고리</label><input className="w-full mt-1 bg-white dark:bg-stone-800 border border-stone-100 dark:border-stone-700 rounded-2xl px-5 py-4 text-xs font-bold outline-none focus:border-teal-500 transition-colors" placeholder="예: C&P, LTSF" value={profileForm.category || ''} onChange={e => setProfileForm({ ...profileForm, category: e.target.value })} /></div>
                                                <div><label className="text-[10px] font-black text-stone-500 ml-2">담당 브랜드 <span className="text-stone-400 font-bold">(검색 가능)</span></label><input className="w-full mt-1 bg-white dark:bg-stone-800 border border-stone-100 dark:border-stone-700 rounded-2xl px-5 py-4 text-xs font-bold outline-none focus:border-teal-500 transition-colors" placeholder="예: 샤넬, 디올, 에스티로더" value={profileForm.brands || ''} onChange={e => setProfileForm({ ...profileForm, brands: e.target.value })} /></div>
                                                <div><label className="text-[10px] font-black text-stone-500 ml-2">개인 내선번호</label><input className="w-full mt-1 bg-white dark:bg-stone-800 border border-stone-100 dark:border-stone-700 rounded-2xl px-5 py-4 text-xs font-bold outline-none focus:border-teal-500 transition-colors" placeholder="예: 6011" value={profileForm.extNumber || ''} onChange={e => setProfileForm({ ...profileForm, extNumber: e.target.value })} /></div>
                                                <button onClick={async () => {
                                                    const targetEmpId = profileForm.targetEmpId || appUser.empId;
                                                    const originalUser = users.find(u => u.empId === targetEmpId);
                                                    const newExtNum = (profileForm.extNumber || '').trim();
                                                    const updatedUser = { ...originalUser, name: profileForm.name, part: profileForm.part, category: profileForm.category, brands: profileForm.brands || '', extNumber: newExtNum, position: profileForm.position || originalUser.position, jobTitle: profileForm.jobTitle || originalUser.jobTitle };

                                                    // 1. 유저 정보 업데이트
                                                    setUsers((users || []).map(u => u.empId === targetEmpId ? updatedUser : u));
                                                    saveToIDB('users', updatedUser);
                                                    setSchedules((schedules || []).map(s => s.empId === targetEmpId ? { ...s, name: profileForm.name, part: profileForm.part } : s));
                                                    if (appUser && appUser.empId === targetEmpId) setAppUser(updatedUser);
                                                    if (db && fbUser) await db.collection(`artifacts/${appId}/public/data/users`).doc(targetEmpId).set(updatedUser, { merge: true });

                                                    // 2. 내선번호 앱 목록 자동 연동 로직
                                                    const existingExt = extensions.find(e => e.id === `ext_${targetEmpId}` || e.user === profileForm.name);

                                                    if (newExtNum) {
                                                        if (existingExt) {
                                                            // 기존에 내선번호 목록이 있으면 업데이트
                                                            const updatedExt = { ...existingExt, number: newExtNum, floor: profileForm.part || existingExt.floor, user: profileForm.name };
                                                            setExtensions(prev => prev.map(e => e.id === existingExt.id ? updatedExt : e));
                                                            saveToIDB('extensions', updatedExt);
                                                            if (db && fbUser) await db.collection(`artifacts/${appId}/public/data/extensions`).doc(existingExt.id).set(updatedExt, { merge: true });
                                                        } else {
                                                            // 없으면 내선번호 앱에 새로 추가
                                                            const newExt = { id: `ext_${targetEmpId}`, number: newExtNum, floor: profileForm.part || '', user: profileForm.name, createdAt: new Date().toISOString() };
                                                            setExtensions(prev => [...(prev || []), newExt]);
                                                            saveToIDB('extensions', newExt);
                                                            if (db && fbUser) await db.collection(`artifacts/${appId}/public/data/extensions`).doc(newExt.id).set(newExt);
                                                        }
                                                    } else if (existingExt && existingExt.id === `ext_${targetEmpId}`) {
                                                        // 내선번호를 지웠을 경우 연동된 내선번호 데이터도 삭제
                                                        setExtensions(prev => prev.filter(e => e.id !== existingExt.id));
                                                        deleteFromIDB('extensions', existingExt.id);
                                                        if (db && fbUser) await db.collection(`artifacts/${appId}/public/data/extensions`).doc(existingExt.id).delete();
                                                    }

                                                    setShowProfileEdit(false);
                                                    showToast('개인 정보 및 내선번호가 연동되었습니다.');
                                                }} className="w-full bg-teal-600 text-white font-black py-4 rounded-2xl shadow-md btn-press text-[13px] mt-1">정보 업데이트</button>
                                            </div>
                                        )}
                                    </div>
                                </ModalWrapper>
                            )
                        }

                        {
                            openedFolder && (
                                <ModalWrapper title={openedFolder.name} icon="folder" color="text-indigo-500" onClose={() => setOpenedFolder(null)}>
                                    <div className="grid grid-cols-4 gap-4 py-4">
                                        {(dynamicApps || []).filter(a => a.parentId === openedFolder.id).sort((a, b) => (a.sortOrder || 99) - (b.sortOrder || 99)).map((app, idx) => (
                                            <button key={idx} className="flex flex-col items-center gap-2 group w-full" onClick={() => { setOpenedFolder(null); handleAppClick(app); }}>
                                                <div className={`w-14 h-14 ${app.bg} ${app.color} rounded-[1rem] shadow-sm flex items-center justify-center transition-all btn-press`}><Icon name={app.icon} size={22} /></div><span className="text-[10px] font-black text-stone-600 dark:text-stone-300 tracking-tighter whitespace-nowrap overflow-hidden text-ellipsis w-full text-center">{app.name}</span>
                                            </button>
                                        ))}
                                    </div>
                                </ModalWrapper>
                            )
                        }

                        {
                            openedGuide && (
                                <ModalWrapper title={openedGuide.name} icon={openedGuide.icon || 'bookOpen'} color={openedGuide.color || 'text-stone-800'} onClose={() => { setOpenedGuide(null); setIsGuideEditMode(false); }}>
                                    <div className="overflow-y-auto scrollbar-hide flex-1 pb-4 space-y-6">
                                        {isGuideEditMode ? (
                                            <div className="space-y-4 fade-in">
                                                {/* 텍스트 입력창 */}
                                                <textarea
                                                    className="w-full bg-white dark:bg-stone-800 border border-stone-100 dark:border-stone-700 rounded-2xl p-4 text-xs font-bold shadow-inner outline-none h-40 resize-none focus:border-teal-500"
                                                    placeholder="안내 내용을 입력하세요."
                                                    value={guideEditForm.content}
                                                    onChange={e => setGuideEditForm({ ...guideEditForm, content: e.target.value })}
                                                ></textarea>

                                                {/* 사진 첨부 버튼 영역 */}
                                                <div className="flex items-center gap-2">
                                                    <label className="flex items-center justify-center flex-1 gap-2 cursor-pointer bg-white dark:bg-stone-800 border border-stone-200 dark:border-stone-700 rounded-xl px-4 py-3 btn-press text-[11px] font-black text-stone-500 hover:bg-stone-50 transition-colors">
                                                        <Icon name="camera" size={14} />
                                                        {guideEditForm.images?.length > 0 ? `사진 추가 (${guideEditForm.images.length})` : '사진 첨부 (여러 장 가능)'}
                                                        <input
                                                            type="file"
                                                            accept="image/*"
                                                            className="hidden"
                                                            multiple
                                                            onChange={async e => {
                                                                if (e.target.files.length > 0) {
                                                                    const files = Array.from(e.target.files);
                                                                    // 여러 장 리사이징 처리
                                                                    const resized = await Promise.all(files.map(f => resizeImage(f)));
                                                                    setGuideEditForm(p => ({
                                                                        ...p,
                                                                        // 기존 사진 유지하면서 새로운 사진들 추가 (최대 5장 제한)
                                                                        images: [...(p.images || []), ...resized].slice(0, 5)
                                                                    }));
                                                                    e.target.value = '';
                                                                }
                                                            }}
                                                        />
                                                    </label>
                                                    {/* 사진 전체 삭제 버튼 */}
                                                    {guideEditForm.images?.length > 0 && (
                                                        <button
                                                            onClick={() => setGuideEditForm(p => ({ ...p, images: [] }))}
                                                            className="text-rose-500 font-black text-[11px] px-3 py-3 border border-rose-200 bg-rose-50 rounded-xl btn-press shrink-0"
                                                        >
                                                            전체 삭제
                                                        </button>
                                                    )}
                                                </div>

                                                {/* 수정 모드: 선택한 사진들 미리보기 (바둑판 배열) */}
                                                {guideEditForm.images?.length > 0 && (
                                                    <div className="grid grid-cols-3 gap-2 mt-2">
                                                        {guideEditForm.images.map((img, i) => (
                                                            <div key={i} className="relative aspect-square">
                                                                <img src={img} className="w-full h-full object-cover rounded-xl border border-stone-200" />
                                                                <button
                                                                    onClick={() => setGuideEditForm(p => ({ ...p, images: p.images.filter((_, idx) => idx !== i) }))}
                                                                    className="absolute -top-1 -right-1 bg-rose-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-[10px]"
                                                                >
                                                                    ×
                                                                </button>
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                        ) : (
                                            /* --- 조회 모드 (View Mode) --- */
                                            <>
                                                {/* 1. 여러 장의 이미지(guideImages)가 있을 때 출력 */}
                                                {openedGuide.guideImages && openedGuide.guideImages.length > 0 ? (
                                                    <div className="space-y-2">
                                                        {openedGuide.guideImages.map((img, i) => (
                                                            <img
                                                                key={i}
                                                                src={img}
                                                                className="w-full h-auto rounded-2xl border border-stone-100 dark:border-stone-700 shadow-sm cursor-pointer"
                                                                onClick={() => setExpandedImage(img)}
                                                            />
                                                        ))}
                                                    </div>
                                                ) : (
                                                    /* 2. 구버전 데이터(사진 한 장) 호환용 */
                                                    openedGuide.guideImage && (
                                                        <img
                                                            src={openedGuide.guideImage}
                                                            className="w-full h-auto max-h-64 object-contain rounded-2xl border border-stone-100 dark:border-stone-700 shadow-sm cursor-pointer"
                                                            onClick={() => setExpandedImage(openedGuide.guideImage)}
                                                        />
                                                    )
                                                )}

                                                {/* 안내 텍스트 출력 */}
                                                {openedGuide.guideContent ? (
                                                    <p className="text-[14px] font-bold text-stone-700 dark:text-stone-300 leading-relaxed whitespace-pre-wrap">
                                                        {openedGuide.guideContent}
                                                    </p>
                                                ) : (
                                                    /* 내용이 아무것도 없을 때 */
                                                    !openedGuide.guideImage && !openedGuide.guideImages?.length && (
                                                        <div className="text-center py-10 bg-white dark:bg-stone-900 rounded-3xl border border-dashed border-stone-200 dark:border-stone-700">
                                                            <p className="text-[11px] font-bold text-stone-400">등록된 안내 내용이 없습니다.</p>
                                                        </div>
                                                    )
                                                )}
                                            </>
                                        )}
                                    </div>

                                    {/* 작성 권한이 있는 경우 버튼 표시 */}
                                    <div className="pt-2 border-t border-stone-100 dark:border-stone-700 space-y-2 shrink-0">
                                        {canWrite(openedGuide) && !isGuideEditMode && (
                                            <button onClick={() => { setGuideEditForm({ content: openedGuide.guideContent || '', images: openedGuide.guideImages || (openedGuide.guideImage ? [openedGuide.guideImage] : []) }); setIsGuideEditMode(true); }} className="w-full bg-stone-100 dark:bg-stone-800 text-stone-600 dark:text-stone-300 font-black py-3 rounded-2xl btn-press text-[12px] flex items-center justify-center gap-2"><Icon name="edit" size={16} /> 내용 수정하기</button>
                                        )}
                                        {isGuideEditMode ? (
                                            <div className="flex gap-2">
                                                <button onClick={() => setIsGuideEditMode(false)} className="flex-1 bg-stone-200 dark:bg-stone-800 text-stone-600 font-black py-4 rounded-2xl btn-press text-[13px]">취소</button>
                                                <button onClick={async () => {
                                                    const updatedApp = { ...openedGuide, guideContent: guideEditForm.content, guideImage: guideEditForm.images };
                                                    setDynamicApps(prev => prev.map(a => a.id === updatedApp.id ? updatedApp : a));
                                                    saveToIDB('dynamicApps', updatedApp);
                                                    if (db && fbUser) await db.collection(`artifacts/${appId}/public/data/dynamic_apps`).doc(updatedApp.id).set(updatedApp, { merge: true });
                                                    setOpenedGuide(updatedApp);
                                                    setIsGuideEditMode(false);
                                                    showToast('안내 내용이 저장되었습니다.');
                                                }} className="flex-1 bg-teal-600 text-white font-black py-4 rounded-2xl shadow-xl btn-press text-[13px]">저장</button>
                                            </div>
                                        ) : (
                                            <button onClick={() => { setOpenedGuide(null); setIsGuideEditMode(false); }} className="w-full bg-stone-800 text-white font-black py-4 rounded-2xl btn-press text-[13px] tracking-widest shrink-0">닫기</button>
                                        )}
                                    </div>
                                </ModalWrapper>
                            )
                        }

                        {
                            openedDynamicApp && (
                                <ModalWrapper
                                    title={openedDynamicApp.name}
                                    icon={openedDynamicApp.icon}
                                    color={openedDynamicApp.color}
                                    onClose={() => { setOpenedDynamicApp(null); setEditingPostId(null); setSubmitFormState({ content: '', photos: [], authorName: '' }); }}
                                >
                                    {/* ✅ 상단 액션 영역 */}
                                    <div className="flex items-center justify-between gap-2 mb-3">
                                        <div className="flex-1 bg-white dark:bg-stone-900 border border-stone-200 dark:border-stone-700 rounded-2xl flex items-center gap-2 px-4 py-3 shadow-sm">
                                            <Icon name="search" size={16} className="text-stone-400 shrink-0" />
                                            <input
                                                type="text"
                                                placeholder="게시글 검색..."
                                                value={boardSearch}
                                                onChange={(e) => setBoardSearch(e.target.value)}
                                                className="w-full bg-transparent outline-none text-[13px] font-bold text-stone-700 dark:text-stone-300 placeholder-stone-400"
                                            />
                                        </div>

                                        {/* ✅ 엑셀 다운로드 버튼 (관리자 + 제출형) */}
                                        {isAdminAuth && openedDynamicApp.actionType === 'form' && (
                                            <button
                                                onClick={() =>
                                                    downloadPostsExcel(
                                                        openedDynamicApp.id,
                                                        openedDynamicApp.name
                                                    )
                                                }
                                                className="shrink-0 bg-teal-50 text-teal-600 font-black text-[11px] px-3 py-2 rounded-xl hover:bg-teal-100 btn-press"
                                            >
                                                엑셀 다운로드
                                            </button>
                                        )}
                                    </div>

                                    {/* ✅ 게시글 리스트 (관리자 보안 및 커스텀 답변 출력 적용) */}
                                    <div className="overflow-y-auto scrollbar-hide flex-1 space-y-4 pb-2 pr-1">
                                        {openedDynamicApp.actionType === 'form' && !isAdminAuth ? (
                                            /* 🔒 1. 폼 제출형인데 관리자가 아닌 경우: 잠금 화면 표시 */
                                            <div className="flex flex-col items-center justify-center py-20 bg-stone-50 dark:bg-stone-900/50 rounded-[2.5rem] border-2 border-dashed border-stone-100 dark:border-stone-800 fade-in">
                                                <Icon name="lock" size={32} className="text-stone-300 mb-3" />
                                                <p className="text-[12px] font-bold text-stone-400">제출된 데이터는 관리자만 열람 가능합니다.</p>
                                                <p className="text-[10px] text-stone-300 mt-1">안심하고 양식을 제출해 주세요.</p>
                                            </div>
                                        ) : (
                                            /* 🔓 2. 관리자이거나 일반 게시판인 경우: 게시글 목록 표시 */
                                            (() => {
                                                const filtered = (dynamicPosts || []).filter((p) => {
                                                    if (p.appId !== openedDynamicApp.id) return false;
                                                    if (!boardSearch) return true;
                                                    const searchTarget = Object.values(p).join(' ').toLowerCase();
                                                    return searchTarget.includes(boardSearch.toLowerCase());
                                                });

                                                if (filtered.length === 0)
                                                    return (
                                                        <div className="text-center py-10 bg-white dark:bg-stone-900 rounded-3xl border border-dashed border-stone-200 dark:border-stone-700">
                                                            <p className="text-[11px] font-bold text-stone-400">게시글이 없습니다.</p>
                                                        </div>
                                                    );

                                                // ✨ 일반 게시판도 고정된 게시글(isPinned) 상단 우선 노출 정렬
                                                const finalPosts = [...filtered].sort((a, b) => (a.isPinned === b.isPinned ? 0 : a.isPinned ? -1 : 1));

                                                return finalPosts.map((post) => {
                                                    // 기존 공지사항과 동일하게 아코디언 상태 활용
                                                    const isExpanded = expandedNoticeId === post.id;
                                                    const isRead = readPostIds.includes(post.id);
                                                    const isPinned = post.isPinned; // ✨ 상단 고정 여부
                                                    const images = Array.isArray(post.photos) && post.photos.length > 0 ? post.photos : (post.photo ? [post.photo] : (typeof post.photos === 'string' ? [post.photos] : []));

                                                    // ✅ 권한 처리 (관리자이거나 본인이 쓴 글이거나 작성 권한자)
                                                    const isMyPost = appUser && post.author === appUser?.name;
                                                    const hasManagePerm = canWrite(openedDynamicApp) || isAdminAuth || isMyPost;

                                                    // ✨ 줄바꿈 원천 차단: 첫 줄만 깨끗하게 자르기
                                                    const rawText = openedDynamicApp.fields && openedDynamicApp.fields.length > 0 ? (post[openedDynamicApp.fields[0].id] || post.content || '내용 없음') : (post.title || post.content || '내용 없음');
                                                    const firstLine = rawText.split('\n')[0];

                                                    return (
                                                        <div
                                                            key={post.id}
                                                            onClick={() => {
                                                                if (!isRead) markPostAsRead(post.id);
                                                                setExpandedNoticeId(isExpanded ? null : post.id);
                                                            }}
                                                            // ✨ 모달 내부 아코디언도 해당 앱의 테마색(bg)을 따름
                                                            className={`mb-3 rounded-2xl border transition-all overflow-hidden cursor-pointer ${isExpanded
                                                                ? 'bg-white dark:bg-stone-800 border-teal-300 dark:border-teal-800 shadow-md'
                                                                : isPinned
                                                                    ? `${openedDynamicApp.bg || 'bg-stone-100'} border-transparent dark:bg-stone-800`
                                                                    : 'bg-stone-50 dark:bg-stone-900 border-stone-100 dark:border-stone-800 hover:border-teal-200'
                                                                }`}
                                                        >
                                                            <div className="p-4 relative">
                                                                <div className="flex items-center gap-1.5 mb-1.5">
                                                                    {!isRead && <div className="w-1.5 h-1.5 bg-teal-500 rounded-full shrink-0 animate-pulse" />}
                                                                    {/* ✨ 핀 아이콘 색상도 앱 컬러 동기화 */}
                                                                    {isPinned && !isExpanded && <Icon name="pin" size={10} className={`${openedDynamicApp.color || 'text-stone-500'}`} />}
                                                                    <span className="text-[10px] font-bold text-stone-400">
                                                                        {post.author} · {formatLocalTime(post.createdAt).slice(5, 10)}
                                                                    </span>
                                                                </div>

                                                                {/* ✨ 1줄 요약 처리 (줄바꿈이 절대 합쳐지지 않게 truncate 적용) */}
                                                                <div className={`pr-8 ${isExpanded ? 'block' : 'truncate'}`}>
                                                                    <p className={`text-[13px] font-bold text-stone-800 dark:text-stone-200 leading-snug ${isExpanded ? 'whitespace-pre-wrap block' : 'truncate'}`}>
                                                                        {isExpanded ? rawText : firstLine}
                                                                    </p>
                                                                </div>

                                                                {/* ✅ 썸네일 상시 노출 */}
                                                                {!isExpanded && images.length > 0 && (
                                                                    <div className="flex gap-1.5 mt-3">
                                                                        {images.slice(0, 4).map((img, i) => (
                                                                            <div key={i} className="w-10 h-10 rounded-lg overflow-hidden border border-stone-100 dark:border-stone-700 shadow-sm shrink-0">
                                                                                <img src={img} className="w-full h-full object-cover" alt="thumb" />
                                                                            </div>
                                                                        ))}
                                                                    </div>
                                                                )}

                                                                <div className={`absolute top-4 right-4 transition-transform ${isExpanded ? `rotate-180 ${openedDynamicApp.color || 'text-teal-500'}` : 'text-stone-300'}`}>
                                                                    <Icon name="chevronDown" size={16} />
                                                                </div>
                                                            </div>

                                                            {/* ✅ 확장 시 상세 영역 */}
                                                            {isExpanded && (
                                                                <div className="px-4 pb-4 bg-white dark:bg-stone-800 fade-in border-t border-stone-50 dark:border-stone-700/50 mt-1 pt-3 cursor-auto" onClick={(e) => e.stopPropagation()}>
                                                                    {/* 폼 양식이 있는 경우 필드별 출력 */}
                                                                    {openedDynamicApp.fields && openedDynamicApp.fields.length > 0 && (
                                                                        <div className="space-y-2 mb-3 bg-stone-50 dark:bg-stone-900/50 p-3 rounded-xl border border-stone-100 dark:border-stone-700">
                                                                            {openedDynamicApp.fields.map(field => (
                                                                                <div key={field.id} className="flex gap-2 text-[11px] border-b border-stone-200 dark:border-stone-700/50 pb-1.5 mb-1.5 last:border-0 last:pb-0 last:mb-0">
                                                                                    <span className="font-black text-indigo-500 dark:text-indigo-400 shrink-0 w-24">· {field.label}</span>
                                                                                    <span className="text-stone-700 dark:text-stone-200 break-all">{post[field.id] || '-'}</span>
                                                                                </div>
                                                                            ))}
                                                                        </div>
                                                                    )}

                                                                    {post.content && (
                                                                        <div className="mt-2 mb-3">
                                                                            <p className="text-[12px] font-bold text-stone-600 dark:text-stone-400 whitespace-pre-wrap">{post.content}</p>
                                                                        </div>
                                                                    )}

                                                                    {/* 큰 이미지 출력 */}
                                                                    {images.length > 0 && (
                                                                        <div className="space-y-2 mb-4">
                                                                            {images.map((img, i) => (
                                                                                <img
                                                                                    key={i}
                                                                                    src={img}
                                                                                    className="w-full rounded-xl border border-stone-100 dark:border-stone-700 object-cover cursor-pointer"

                                                                                />

                                                                            </button>

                                                                                onClick={(e) => handleDeleteDynamicPost(e, post.id)}

                                                                                삭제
                                                                            </button>
                                                                        </div>

                                                        </div>

                                                        onClick={() => { setEditingPostId(null); setSubmitFormState({ content: '', photos: [], authorName: '' }); }}
                                                        className="text-[10px] font-black text-stone-400 hover:text-rose-500 bg-stone-100 dark:bg-stone-800 px-3 py-1.5 rounded-lg btn-press"

                                                        취소
                                                    </button>
                                                </div>
                                            )}

                                            {!appUser && !editingPostId && (

                                                    value={submitFormState.authorName || ''}

                                                    onChange={e => setSubmitFormState({ ...submitFormState, isPinned: e.target.checked })}

                                                        ? '사진 첨부 (최대 5장)'
                                                        : submitFormState.photos?.length >= 5
                                                            ? `사진 첨부 완료 (5/5)`

                                                    }
                                                    <input
                                                        type="file"
                                                        className="hidden"
                                                        accept="image/*"
                                                        onChange={(e) => handlePhotoSingle(e, setSubmitFormState)}
                                                    />
                                                </label>

                                                <button
                                                    onClick={handleGenericPostSubmit}
                                                    className={`flex-1 font-black py-3 rounded-xl shadow-md btn-press text-[11px] text-white ${editingPostId ? 'bg-teal-500 hover:bg-teal-600' : 'bg-stone-800 hover:bg-stone-700'}`}

                                                    {editingPostId ? '수정 완료' : '게시글 등록'}
                                                </button>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="shrink-0 pt-4 border-t border-stone-200 dark:border-stone-700 mt-2 text-center">
                                            <p className="text-[11px] font-bold text-stone-400 bg-stone-50 dark:bg-stone-800 py-3 rounded-xl border border-stone-100 dark:border-stone-700">
                                                {writeBlockedMsg(openedDynamicApp)}
                                            </p>
                                        </div>
                                    )}
                                </ModalWrapper>
                            )
                        }

                        {openedSubmitForm && (
                            <ModalWrapper
                                title={openedSubmitForm.name}
                                icon={openedSubmitForm.icon}
                                color={openedSubmitForm.color}
                                onClose={() => {

                                    setSubmitFormState({ content: '', photos: [], authorName: '', isPinned: false });
                                }}
                            >
                                <div className="space-y-4">
                                    {/* 상단 안내 문구 */}

                                            안심하고 양식을 작성해 주세요.
                                        </p>
                                    </div>

                                    {canWrite(openedSubmitForm) ? (
                                        <>
                                            {/* 1. 작성자 성함 입력칸 (비로그인 시에만 노출) */}
                                            {!appUser && (
                                                <div className="space-y-1.5 mb-6">
                                                    <label className="text-[11px] font-bold text-indigo-600 dark:text-indigo-400 ml-1 flex items-center gap-1">

                                                        value={submitFormState.authorName || ''}
                                                        onChange={e => setSubmitFormState({ ...submitFormState, authorName: e.target.value })}
                                                    />
                                                </div>
                                            )}

                                            {/* 2. 커스텀 질문 리스트 (한 번만 매핑) */}

                                                <div key={field.id} className="space-y-1.5">
                                                    <label className="text-[11px] font-bold text-stone-500 dark:text-stone-400 ml-1">

                                                            value={submitFormState[field.id] || ''}
                                                            onChange={e => setSubmitFormState({ ...submitFormState, [field.id]: e.target.value })}
                                                        />
                                                    ) : (
                                                        <input
                                                            type={field.type}
                                                            className="w-full bg-white dark:bg-stone-800 border border-stone-100 dark:border-stone-700 rounded-2xl p-4 text-xs font-bold shadow-inner outline-none focus:border-indigo-400"
                                                            placeholder={`${field.label} 입력`}
                                                            value={submitFormState[field.id] || ''}
                                                            onChange={e => setSubmitFormState({ ...submitFormState, [field.id]: e.target.value })}
                                                        />
                                                    )}
                                                </div>
                                            ))}

                                            <div className="flex gap-2 mt-4">

                                                    <Icon name="camera" size={16} />
                                                    {(submitFormState.photos || []).length === 0
                                                        ? '사진 첨부 (최대 5장)'
                                                        : `사진 추가됨 (${submitFormState.photos.length}/5)`
                                                    }
                                                    <input type="file" className="hidden" accept="image/*" multiple onChange={(e) => handlePhotoSingle(e, setSubmitFormState)} />
                                                </label>

                                                <button
                                                    onClick={() => handleGenericPostSubmit()}
                                                    className="w-24 bg-stone-800 text-white font-black py-4 rounded-2xl shadow-md btn-press text-[12px]"
                                                >
                                                    접수
                                                </button>
                                            </div>

                                            {/* 사진 미리보기 영역 */}
                                            {submitFormState.photos && submitFormState.photos.length > 0 && (
                                                <div className="flex gap-2 mt-2 overflow-x-auto pb-2">
                                                    {submitFormState.photos.map((p, idx) => (
                                                        <img key={idx} src={p} className="w-16 h-16 rounded-xl object-cover border border-stone-200 dark:border-stone-700" />
                                                    ))}
                                                </div>
                                            )}
                                        </>

                                        <div className="text-center py-10">
                                            <p className="text-[11px] font-bold text-stone-400 bg-stone-50 dark:bg-stone-800 py-4 rounded-xl border border-stone-100 dark:border-stone-700">
                                                {writeBlockedMsg(openedSubmitForm)}
                                            </p>
                                        </div>
                                    )}
                                </div>
                            </ModalWrapper>

                            openedAdminBoard && (

                                                <label className="flex items-center gap-2 cursor-pointer bg-stone-50 dark:bg-stone-900 border border-dashed border-stone-300 dark:border-stone-600 rounded-xl px-4 py-2.5 btn-press hover:bg-stone-100 transition-colors">
                                                    <Icon name="camera" size={14} className="text-stone-400" /><span className="text-[11px] font-bold text-stone-400">{adminBoardForm.photos?.length === 0
                                                        ? '사진 첨부 (선택)'
                                                        : adminBoardForm.photos?.length >= 5
                                                            ? '사진 첨부 완료 (5/5)'
                                                            : `사진 추가됨 (${adminBoardForm.photos.length}/5)`
                                                    }</span>
                                                    <input type="file" accept="image/*" className="hidden" multiple onChange={async e => { if (e.target.files[0]) { const b64 = await resizeImage(e.target.files[0]); setAdminBoardForm(prev => ({ ...prev, photos: [b64] })); e.target.value = ''; } }} />
                                                </label>
                                                {adminBoardForm.photos && adminBoardForm.photos.length > 0 && <div className="relative w-16 h-16"><img src={adminBoardForm.photos[0]} className="w-full h-full object-cover rounded-xl border" /><button onClick={() => setAdminBoardForm(p => ({ ...p, photos: [] }))} className="absolute -top-1.5 -right-1.5 bg-rose-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-[10px] font-black">×</button></div>}
                                                <div className="flex gap-2"><button onClick={() => handleAdminBoardPost(openedAdminBoard.id)} className="w-full bg-indigo-600 text-white font-black py-3 rounded-2xl shadow-md btn-press text-[11px]">게시글 등록</button></div>
                                            </div>
                                        )}
                                        {selectedAdminPost ? (
                                            <div className="bg-white dark:bg-stone-800 rounded-[2rem] border border-stone-200 dark:border-stone-700 p-6 shadow-sm space-y-4 fade-in">
                                                <h4 className="text-[16px] font-black text-stone-800 dark:text-stone-200">{selectedAdminPost.title}</h4><p className="text-[10px] text-stone-400 font-bold mt-1">{selectedAdminPost.author} · {formatLocalTime(selectedAdminPost.createdAt)}</p>
                                                {selectedAdminPost.photos && Array.isArray(selectedAdminPost.photos) && selectedAdminPost.photos.length > 0 && selectedAdminPost.photos.map((ph, i) => (
                                                    <img key={i} src={ph} className="w-full h-auto rounded-2xl object-cover cursor-pointer mb-1" onClick={() => setExpandedImage(ph)} />
                                                ))}
                                                <div className="border-t border-stone-100 dark:border-stone-700 pt-4"><p className="text-[13px] font-bold text-stone-700 dark:text-stone-300 whitespace-pre-wrap">{selectedAdminPost.content}</p></div>
                                                <button onClick={() => setSelectedAdminPost(null)} className="w-full bg-stone-100 dark:bg-stone-700 text-stone-500 dark:text-stone-300 font-black py-3 rounded-2xl btn-press text-[11px]">목록으로</button>
                                            </div>
                                        ) : (
                                            <div className="space-y-3">
                                                {(dynamicPosts || []).filter(p => p.appId === openedAdminBoard.id).length === 0 && (<div className="text-center py-10 bg-white dark:bg-stone-900 rounded-3xl border border-dashed border-stone-200 dark:border-stone-700"><p className="text-[11px] font-bold text-stone-400">등록된 게시글이 없습니다.</p></div>)}
                                                {(dynamicPosts || []).filter(p => p.appId === openedAdminBoard.id).map(post => {
                                                    const isUnread = !readPostIds.includes(post.id);
                                                    return (
                                                        <div key={post.id} className="flex items-center justify-between bg-white dark:bg-stone-800 p-4 rounded-2xl border border-stone-100 dark:border-stone-700 shadow-sm group hover:border-indigo-200 transition-colors relative" onClick={() => { if (isUnread) { const next = [...readNoticeIds, post.id]; setReadNoticeIds(next); localStorage.setItem('hmood_read_notices', JSON.stringify(next)); } }}>
                                                            {isUnread && <div className="absolute -top-1 -right-1 w-2.5 h-2.5 bg-rose-500 rounded-full shadow-sm"></div>}
                                                            <button onClick={() => setSelectedAdminPost(post)} className="flex-1 text-left btn-press"><p className="text-[13px] font-black text-stone-800 dark:text-stone-200 truncate group-hover:text-indigo-600">{post.title}</p><p className="text-[10px] text-stone-400 font-bold mt-1">{post.author} · {formatLocalTime(post.createdAt)}</p></button>
                                                            {canDelete(openedAdminBoard) && (<button onClick={(e) => handleDeleteDynamicPost(e, post.id)} className="text-white bg-rose-400 hover:bg-rose-500 p-2 rounded-lg ml-2 btn-press shadow-sm z-10"><Icon name="trash" size={14} /></button>)}
                                                        </div>
                                                    )
                                                })}
                                            </div>
                                        )}
                                    </div>
                                </ModalWrapper>
                            )
                        }

                        {
                            showExtModal && (
                                <ModalWrapper title="내선번호 통합 조회" icon="phoneForwarded" color="text-teal-500" onClose={() => setShowExtModal(false)}>
                                    <div className="bg-white dark:bg-stone-900 border border-stone-200 dark:border-stone-800 rounded-2xl flex items-center gap-2 px-4 py-3 shadow-sm mb-4"><Icon name="search" size={16} className="text-stone-400 shrink-0" /><input type="text" placeholder="번호, 층, 사용자 검색..." value={extSearch} onChange={(e) => setExtSearch(e.target.value)} className="w-full bg-transparent outline-none text-[13px] font-bold text-stone-700 dark:text-stone-300 placeholder-stone-400" /></div>
