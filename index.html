                                            {filteredExtensions.map(ext => (
                                                <div key={ext.id} className="bg-white dark:bg-stone-900 p-4 rounded-2xl border border-stone-100 dark:border-stone-800 shadow-sm flex justify-between items-center cursor-pointer hover:border-teal-200 transition-colors" onClick={(e) => callExtension(ext?.number, ext?.user, e)}>
                                                    <div className="flex items-center gap-3"><button onClick={(e) => { e.stopPropagation(); toggleFavExt(ext.id); }} className={`${favoriteExts.includes(ext.id) ? 'text-amber-400' : 'text-stone-300'} hover:scale-110 transition-all`}><Icon name={favoriteExts.includes(ext.id) ? 'starFilled' : 'star'} size={20} /></button><div className="flex flex-col"><span className="text-[14px] font-black text-stone-700 dark:text-stone-300">{ext?.user}</span><span className="text-[11px] font-bold text-stone-400 mt-0.5">{ext?.floor}</span></div></div>
                                                    <button className="text-[13px] font-black text-stone-600 dark:text-stone-300 bg-stone-50 dark:bg-stone-800 px-4 py-2.5 rounded-xl btn-press border border-stone-200 dark:border-stone-700 flex items-center gap-2"><Icon name="phoneCall" size={14} /> {ext?.number}</button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </ModalWrapper>
                            )
                        }

                        {
                            confirmDialog.isOpen && (
                                <div className="fixed inset-0 z-[400] flex items-center justify-center p-4 bg-stone-900/80 backdrop-blur-sm fade-in">
                                    <div className="bg-white dark:bg-stone-800 w-full max-w-sm rounded-[3rem] p-8 shadow-2xl text-center">
                                        <p className="text-[14px] font-black text-stone-600 dark:text-stone-300 whitespace-pre-wrap leading-relaxed mb-8 mt-4">{confirmDialog.message}</p>
                                        <div className="flex gap-3">
                                            <button onClick={confirmDialog.onCancel} className="flex-1 bg-stone-100 dark:bg-stone-700 text-stone-500 dark:text-stone-300 font-black py-4 rounded-2xl text-[13px] btn-press">취소</button>
                                            {confirmDialog.telHref ? (<a href={confirmDialog.telHref} onClick={confirmDialog.onCancel} className="flex-1 flex items-center justify-center bg-teal-600 text-white font-black py-4 rounded-2xl text-[13px] decoration-none btn-press">통화 연결</a>) : (<button onClick={confirmDialog.onConfirm} className="flex-1 bg-stone-800 text-white font-black py-4 rounded-2xl text-[13px] btn-press">확인</button>)}
                                        </div>
                                    </div>
                                </div>
                            )
                        }

                        {/* 월간 셀 말풍선 팝업 */}
                        {
                            expandedCell && (
                                <div className="fixed inset-0 z-[200]" onClick={() => setExpandedCell(null)}>
                                    <div
                                        className="absolute z-[201] pointer-events-none"
                                        style={{
                                            left: Math.min(expandedCell.rect.left + expandedCell.rect.width / 2, window.innerWidth - 120),
                                            top: expandedCell.rect.bottom + 6,
                                            transform: 'translateX(-50%)'
                                        }}
                                    >
                                        <div className={`px-3 py-2 rounded-xl shadow-xl text-[12px] font-black whitespace-nowrap border ${STATUS_THEME[expandedCell.status] || 'bg-stone-800 text-white border-stone-700'}`}
                                            style={STATUS_INLINE_STYLE[expandedCell.status] || {}}>
                                            {expandedCell.status}
                                        </div>
                                        <div className="w-2 h-2 mx-auto -mt-1 rotate-45 rounded-sm"
                                            style={{ background: 'inherit' }}
                                        />
                                    </div>
                                </div>
                            )
                        }

                        {
                            expandedImage && (
                                <div className="fixed inset-0 z-[300] bg-black/90 flex items-center justify-center p-4 fade-in cursor-pointer" onClick={() => setExpandedImage(null)}>
                                    <img src={expandedImage} className="max-w-full max-h-full rounded-2xl object-contain shadow-2xl cursor-auto" onClick={e => e.stopPropagation()} />
                                    <button className="absolute top-6 right-6 text-white p-3 bg-white/20 hover:bg-white/40 rounded-full btn-press"><Icon name="x" size={28} /></button>
                                </div>
                            )
                        }

                        {
                            toast && (
                                <div className={`fixed top-24 left-1/2 -translate-x-1/2 z-[400] backdrop-blur-md px-10 py-5 rounded-[2rem] shadow-2xl font-black text-[13px] flex items-center gap-3 border ${toastError ? 'bg-rose-500/95 text-white border-rose-400' : 'bg-stone-800/95 text-white border-white/10'}`}>
                                    <Icon name={toastError ? "alertCircle" : "checkCircle"} size={18} className={toastError ? "text-white" : "text-teal-400"} />
                                    {toast}
                                </div>
                            )
                        }
                    </div >
                    {/* ✅ "우이야" 스타일 실시간 공지사항 전용 팝업 (전체 클릭 & 문법 수정본) */}
                    {
                        showWidgetNoticesPopup && openedDynamicApp && (
                            <ModalWrapper
                                title={openedDynamicApp.name}
                                icon={openedDynamicApp.icon}
                                color={openedDynamicApp.color}
                                onClose={() => {
                                    setShowWidgetNoticesPopup(false);
                                    setOpenedDynamicApp(null);
                                    setBoardSearch('');
                                    setExpandedNoticeId(null);
                                }}
                            >
                                {/* 전체 컨테이너 시작 */}
                                <div className="flex flex-col h-full max-h-[70vh]">

                                    {/* 1. 상단 검색창 */}
                                    <div className="bg-white dark:bg-stone-900 border border-stone-200 dark:border-stone-700 rounded-2xl flex items-center gap-2 px-4 py-3 mb-4 shrink-0 shadow-sm focus-within:border-rose-400 transition-colors">
                                        <Icon name="search" size={16} className="text-stone-400 shrink-0" />
                                        <input
                                            type="text"
                                            placeholder="게시글 검색..."
                                            value={boardSearch}
                                            onChange={(e) => setBoardSearch(e.target.value)}
                                            className="w-full bg-transparent outline-none text-[13px] font-bold text-stone-700 dark:text-stone-300 placeholder-stone-400"
                                        />
                                    </div>

                                    {/* 2. 게시글 리스트 영역 */}
                                    <div className="overflow-y-auto scrollbar-hide flex-1 space-y-3 pb-2">
                                        {(() => {
                                            const filteredNotices = (notices || []).filter(n => {
                                                if (!boardSearch) return true;
                                                return (n.content || '').toLowerCase().includes(boardSearch.toLowerCase()) ||
                                                    (n.author || '').toLowerCase().includes(boardSearch.toLowerCase());
                                            });

                                            if (filteredNotices.length === 0) {
                                                return (
                                                    <div className="flex flex-col items-center justify-center py-12 border-2 border-dashed border-stone-100 dark:border-stone-800 rounded-3xl">
                                                        <p className="text-[12px] font-bold text-stone-400">게시글이 없습니다.</p>
                                                    </div>
                                                );
                                            }

                                            return filteredNotices.map(notice => {
                                                const isRead = readNoticeIds.includes(notice.id);
                                                const isExpanded = expandedNoticeId === notice.id;
                                                // ✅ 이미지 배열 안전 추출
                                                const images = Array.isArray(notice.photos) && notice.photos.length > 0 ? notice.photos : (notice.photo ? [notice.photo] : []);
                                                const isMyPost = appUser && notice.author === appUser?.name;
                                                const hasManagePerm = canWrite(openedDynamicApp) || isAdminAuth || isMyPost;

                                                // ✅ 중요 공지 여부 확인 변수 추가
                                                const isPinned = notice.isPinned;

                                                // ✨ 줄바꿈 완벽 분리: 첫 줄만 추출
                                                const firstLine = notice.content ? notice.content.split('\n')[0] : '';

                                                return (
                                                    <div
                                                        key={notice.id}
                                                        onClick={() => {
                                                            if (!isRead) markAsRead(notice.id);
                                                            setExpandedNoticeId(isExpanded ? null : notice.id);
                                                        }}
                                                        // ✅ 중요 공지(isPinned)일 경우 배경색을 살짝 붉게(rose-50) 처리하여 눈에 띄게 변경!
                                                        className={`rounded-2xl border transition-all overflow-hidden cursor-pointer ${isExpanded
                                                            ? 'bg-white dark:bg-stone-800 border-rose-300 dark:border-rose-800 shadow-md'
                                                            : isPinned
                                                                ? 'bg-rose-50 dark:bg-rose-900/20 border-rose-200 dark:border-rose-800 hover:border-rose-300'
                                                                : 'bg-stone-50 dark:bg-stone-900 border-stone-100 dark:border-stone-800 hover:border-rose-200'
                                                            }`}
                                                    >
                                                        <div className="p-4 relative">
                                                            <div className="flex items-center gap-1.5 mb-1.5">
                                                                {!isRead && <div className="w-1.5 h-1.5 bg-rose-500 rounded-full shrink-0 animate-pulse" />}
                                                                {/* ✅ 중요 공지 아이콘 추가 (펼쳐졌을 땐 숨김 처리) */}
                                                                {isPinned && !isExpanded && <Icon name="pin" size={10} className="text-rose-500" />}
                                                                <span className={`text-[10px] font-bold ${isPinned ? 'text-rose-500' : 'text-stone-400'}`}>
                                                                    {notice.author} · {formatLocalTime(notice.createdAt).slice(5, 10)}
                                                                </span>
                                                            </div>

                                                            {/* ✨ 무조건 1줄로 보이게 수정! (CSS truncate + JS 첫 줄 추출 연동) */}
                                                            <div className={`pr-8 ${isExpanded ? 'block' : 'truncate'}`}>
                                                                <p className={`text-[13px] font-bold text-stone-800 dark:text-stone-200 leading-snug ${isExpanded ? 'whitespace-pre-wrap block' : 'truncate'}`}>
                                                                    {isExpanded ? notice.content : firstLine}
                                                                </p>
                                                            </div>

                                                            {/* 썸네일 상시 노출 */}
                                                            {!isExpanded && images.length > 0 && (
                                                                <div className="flex gap-1.5 mt-3">
                                                                    {images.slice(0, 4).map((img, i) => (
                                                                        <div key={i} className="w-10 h-10 rounded-lg overflow-hidden border border-stone-100 dark:border-stone-700 shadow-sm shrink-0">
                                                                            <img src={img} className="w-full h-full object-cover" alt="thumb" />
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                            )}

                                                            <div className={`absolute top-4 right-4 transition-transform ${isExpanded ? 'rotate-180 text-rose-500' : 'text-stone-300'}`}>
                                                                <Icon name="chevronDown" size={16} />
                                                            </div>
                                                        </div>

                                                        {/* 확장 시 상세 영역 (이하 동일) */}
                                                        {isExpanded && (
                                                            <div className="px-4 pb-4 bg-white dark:bg-stone-800 fade-in border-t border-stone-50 dark:border-stone-700/50 mt-1 pt-3">
                                                                {images.length > 0 && (
                                                                    <div className="space-y-2 mb-4">
                                                                        {images.map((img, i) => (
                                                                            <img
                                                                                key={i}
                                                                                src={img}
                                                                                className="w-full rounded-xl border border-stone-100 dark:border-stone-700 object-cover cursor-pointer"
                                                                                onClick={(e) => {
                                                                                    e.stopPropagation();
                                                                                    setExpandedImage(img);
                                                                                }}
                                                                            />
                                                                        ))}
                                                                    </div>
                                                                )}

                                                                {(hasManagePerm) && (
                                                                    <div className="flex justify-end gap-3 pt-3 border-t border-stone-50 dark:border-stone-800">
                                                                        <button
                                                                            onClick={(e) => {
                                                                                e.stopPropagation();
                                                                                setEditingNoticeId(notice.id);
                                                                                setNoticeForm({ content: notice.content, photos: images, isPinned: notice.isPinned });
                                                                                setIsNoticeModalOpen(true);
                                                                            }}
                                                                            className="text-[11px] font-black text-teal-500 hover:underline px-2 py-1"
                                                                        >
                                                                            수정
                                                                        </button>
                                                                        <button
                                                                            onClick={(e) => {
                                                                                e.stopPropagation();
                                                                                handleDeleteNotice(notice.id);
                                                                            }}
                                                                            className="text-[11px] font-black text-rose-500 hover:underline px-2 py-1"
                                                                        >
                                                                            삭제
                                                                        </button>
                                                                    </div>
                                                                )}
                                                            </div>
                                                        )}
                                                    </div>
                                                );
                                            });
                                        })()}
                                    </div>

                                    {/* 3. 하단 글쓰기 버튼 */}
                                    <div className="shrink-0 pt-4 mt-2">
                                        {canWrite(openedDynamicApp) ? (
                                            <button
                                                onClick={() => {
                                                    setEditingNoticeId(null);
                                                    setNoticeForm({ content: '', photos: [], isPinned: false });
                                                    setIsNoticeModalOpen(true);
                                                }}
                                                className="w-full bg-rose-500 hover:bg-rose-600 text-white font-black py-4 rounded-2xl shadow-xl btn-press text-[13px] flex items-center justify-center gap-2"
                                            >
                                                <Icon name="edit" size={16} /> 새 공지사항 작성
                                            </button>
                                        ) : (
                                            <div className="w-full bg-stone-100 dark:bg-stone-800 text-stone-400 font-bold py-4 rounded-2xl text-[12px] text-center border border-stone-200 dark:border-stone-700">
                                                작성 권한이 없습니다.
                                            </div>
                                        )}
                                    </div>
                                </div> {/* 전체 컨테이너 끝 */}
                            </ModalWrapper>
                        )
                    }
                </>
            ); // <--- return 문이 끝나는 곳
        }; // 👈 ✨ 짜잔! 바로 여기에 추가해 주시면 됩니다!

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
