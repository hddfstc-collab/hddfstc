        const resizeImage = (file, maxBytes = 300000) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let MAX_WIDTH_OR_HEIGHT = 1920;
                        let width = img.width; let height = img.height;

                        const calculateSize = (w, h) => {
                            if (w > h && w > MAX_WIDTH_OR_HEIGHT) { h *= MAX_WIDTH_OR_HEIGHT / w; w = MAX_WIDTH_OR_HEIGHT; }
                            else if (h > MAX_WIDTH_OR_HEIGHT) { w *= MAX_WIDTH_OR_HEIGHT / h; h = MAX_WIDTH_OR_HEIGHT; }
                            return { w, h };
                        };

                        let { w, h } = calculateSize(width, height);
                        let quality = 0.85;

                        const compress = () => {
                            canvas.width = w; canvas.height = h;
                            const ctx = canvas.getContext('2d');
                            ctx.imageSmoothingQuality = 'high';
                            ctx.drawImage(img, 0, 0, w, h);

                            const dataUrl = canvas.toDataURL('image/jpeg', quality);

                            if (dataUrl.length > maxBytes) {
                                if (quality > 0.4) {
                                    quality -= 0.1;
                                    compress();
                                } else {
                                    MAX_WIDTH_OR_HEIGHT *= 0.8;
                                    let newSize = calculateSize(img.width, img.height);
                                    w = newSize.w; h = newSize.h;
                                    quality = 0.7;
                                    compress();
                                }
                            } else {
                                resolve(dataUrl);
                            }
                        };
                        compress();
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            });
        };

        const RouletteWheel = ({ names, rotation }) => {
            const n = names.length;
            if (!n) return null;
            const size = 260, cx = size / 2, cy = size / 2, r = size / 2 - 6;
            const COLORS = ['#0d9488', '#f43f5e', '#f59e0b', '#6366f1', '#10b981', '#8b5cf6', '#f97316', '#06b6d4', '#84cc16', '#ec4899', '#14b8a6', '#a855f7'];
            const angle = (2 * Math.PI) / n;
            const sectors = names.map((name, i) => {
                const s = i * angle - Math.PI / 2, e = s + angle;
                const x1 = cx + r * Math.cos(s), y1 = cy + r * Math.sin(s), x2 = cx + r * Math.cos(e), y2 = cy + r * Math.sin(e);
                const mid = s + angle / 2, tr = r * 0.60;
                return { path: `M${cx},${cy}L${x1},${y1}A${r},${r},0,${angle > Math.PI ? 1 : 0},1,${x2},${y2}Z`, color: COLORS[i % COLORS.length], tx: cx + tr * Math.cos(mid), ty: cy + tr * Math.sin(mid), rot: (mid * 180 / Math.PI) + 90, label: name.length > 5 ? name.slice(0, 5) : name };
            });
            return (
                <div className="relative inline-flex flex-col items-center">
                    <div className="absolute -top-3 left-1/2 z-10 -translate-x-1/2">
                        <div className="w-0 h-0 border-l-[11px] border-r-[11px] border-t-[18px] border-l-transparent border-r-transparent border-t-amber-400 drop-shadow" />
                    </div>
                    <svg width={size} height={size} style={{ transform: `rotate(${rotation}deg)`, transition: 'transform 4s cubic-bezier(0.17,0.67,0.12,0.99)' }}>
                        {sectors.map((s, i) => (
                            <g key={i}>
                                <path d={s.path} fill={s.color} stroke="rgba(255,255,255,0.4)" strokeWidth="1.5" />
                                {n <= 20 && <text x={s.tx} y={s.ty} textAnchor="middle" dominantBaseline="middle" fill="white" fontSize={n > 12 ? 7 : 9} fontWeight="900" transform={`rotate(${s.rot},${s.tx},${s.ty})`}>{s.label}</text>}
                            </g>
                        ))}
                        <circle cx={cx} cy={cy} r={16} fill="white" stroke="#e2e8f0" strokeWidth="3" />
                        <circle cx={cx} cy={cy} r={9} fill="#0d9488" />
                    </svg>

            const handleDownloadScheduleTemplate = () => {

            const handleParticipateEvent = async () => {

            const handleTeamDraw = async () => {

                }
                if (!pool.length) return showToast('참여자가 없습니다.', true);
                let weightedPool = [...pool];
                if (eventSettings.enableWeighted && winHistory.length > 0) {
                    const maxCount = Math.max(...winHistory.map(h => h.count), 1);
                    weightedPool = pool.flatMap(id => {

                                                        }
                                                    }}
                                                    className={`text-[10px] font-bold text-teal-600 transition-all ${isCatExpanded ? 'whitespace-normal' : 'truncate'} ${isCatExpanded ? 'cursor-pointer' : 'hover:underline decoration-teal-300'}`}
                                                >
                                                    {m.category || '-'}
                                                </p>
                                            </div>
                                            <div className="flex items-center justify-between mt-auto pt-2 border-t border-stone-100 dark:border-stone-700/50">
                                                <span className={`px-2.5 py-1 rounded-lg text-[9px] font-black ${STATUS_THEME[scheduleMap[m.empId]?.[todayStr]?.status || '출근']}`}>
                                                    {scheduleMap[m.empId]?.[todayStr]?.status || '출근'}
                                                </span>
                                                {ext && (
                                                    <button onClick={(e) => { e.stopPropagation(); callExtension(dialNumber, m.name, e); }} className="text-stone-400 hover:text-teal-500 p-1.5 bg-white dark:bg-stone-800 rounded-full shadow-sm btn-press">
                                                        <Icon name="phoneCall" size={12} />
                                                    </button>
                                                )}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    );
                }

                // 🛠️ 1. 공지사항 위젯 (메인 화면 - 썸네일/관리 버튼 유지 + 팝업 연결 아이콘 추가)
                if (app.actionType === 'widget_notices') {
                    return (
                        <div key={app.id} className="bg-white dark:bg-stone-900 rounded-[2.5rem] p-6 shadow-sm border border-stone-200/60 dark:border-stone-800 space-y-4 mt-4 fade-in">
                            {/* 헤더: 클릭 시 전체 팝업 오픈 */}
                            <h3 className={`text-xs font-black flex items-center gap-2 ${app.color} cursor-pointer hover:opacity-80`}
                                onClick={() => { setOpenedDynamicApp(app); setShowWidgetNoticesPopup(true); }}
                            >
                                <Icon name={app.icon} size={16} /> {app.name} <Icon name="chevronRight" size={12} className="opacity-30" />
                            </h3>

                            <div className="space-y-3">
                                {(notices || []).slice(0, 5).map(n => {
                                    // ✨ 상단 고정 여부 및 줄바꿈 원천 차단 첫 줄 추출
                                    const isPinned = n.isPinned;
                                    const firstLine = n.content ? n.content.split('\n')[0] : '';

                                    return (
                                        <div
                                            key={n.id}
                                            // ✨ 고정된 글 배경색 처리 추가 (isPinned 조건)
                                            className={`p-4 rounded-3xl border relative group cursor-pointer transition-colors ${isPinned
                                                ? 'bg-rose-50 dark:bg-rose-900/20 border-rose-200 dark:border-rose-800 hover:border-rose-300'
                                                : 'bg-stone-50 dark:bg-stone-800 border-stone-100 dark:border-stone-700 hover:border-rose-200'
                                                }`}
                                            // ✅ 항목 클릭 시 전체 공지사항 모달 팝업 오픈
                                            onClick={() => { setOpenedDynamicApp(app); setShowWidgetNoticesPopup(true); }}
                                        >
                                            <div className="flex justify-between items-start gap-2">
                                                {/* 텍스트 내용 (✨ 기존 line-clamp 대신 truncate로 1줄 강제 고정 및 핀 아이콘 추가) */}
                                                <p className="text-[12px] font-bold text-stone-800 dark:text-stone-200 truncate leading-snug flex-1">
                                                    {isPinned && <Icon name="pin" size={10} className="inline text-rose-500 mr-1 mb-0.5" />}
                                                    {firstLine}
                                                </p>

                                                {/* ✅ 이미지에서 본 바로 그 '확장 아이콘' (모달 팝업 트리거) */}
                                                <div className={`shrink-0 mt-0.5 transition-colors ${isPinned ? 'text-rose-500' : 'text-stone-300 group-hover:text-rose-500'}`}>
                                                    <Icon name="chevronRight" size={14} />
                                                </div>
                                            </div>

                                            {/* ✅ 사진 썸네일 (기능 유지) */}
                                            {n.photos && n.photos.length > 0 && (
                                                <div className="flex gap-1.5 mt-3">
                                                    {n.photos.slice(0, 5).map((p, i) => (
                                                        <div key={i} className="w-10 h-10 rounded-lg overflow-hidden border border-white dark:border-stone-700 shadow-sm shrink-0">
                                                            <img src={p} className="w-full h-full object-cover" alt="thumb" />
                                                        </div>
                                                    ))}
                                                </div>
                                            )}

                                            {/* 하단 정보 (작성자·날짜만 표시 — 수정/삭제는 모달 팝업에서) */}
                                            <div className="mt-3 text-[9px] font-black text-stone-400 pt-2 border-t border-stone-100 dark:border-stone-700/50">
                                                <span>{n.author} | {formatLocalTime(n.createdAt)}</span>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    );
                }
                return null;
            };
            const renderMemberItem = (u) => (
                <div key={u.empId} className="grid grid-cols-[1.2fr_0.8fr_1fr_0.8fr_auto] gap-2 items-center bg-white dark:bg-stone-900 p-4 rounded-2xl border border-stone-100 shadow-sm mb-2">
                    <div className="min-w-0">
                        <span className="text-[11px] font-black text-stone-700 dark:text-stone-300 truncate block">{u.part}</span>
                        <span className="text-[9px] text-stone-400 font-bold uppercase">Part</span>
                    </div>
                    <div className="text-center">
                        <span className="text-[10px] font-black text-teal-600 bg-teal-50 px-2 py-0.5 rounded-md border border-teal-100">{u.jobTitle || '일반'}</span>
                    </div>
                    <div className="text-center">
                        <span className="text-[11px] font-mono font-bold text-stone-500">{u.empId}</span>
                    </div>
                    <div className="text-right">
                        <span className="text-[13px] font-black text-stone-800 dark:text-stone-200">{u.name}</span>
                        <p className="text-[9px] text-stone-400">{u.position}</p>
                    </div>
                    <div className="flex gap-1 ml-2 pl-2 border-l">
                        <button onClick={() => handleEditMember(u)} className="p-1 text-teal-500"><Icon name="edit" size={14} /></button>
                        <button onClick={() => handleDeleteMember(u.empId)} className="p-1 text-rose-400"><Icon name="trash" size={14} /></button>
                    </div>
                </div>
            );
            return (
                <>
                    <div className="flex flex-col h-screen min-h-screen bg-[#EBE9E4] dark:bg-stone-950 text-stone-700 dark:text-stone-300 fade-in">

                        {viewMode !== 'shared' && (
                            <header className="flex-none sticky top-0 z-50 bg-[#F9F8F6]/95 dark:bg-stone-900/95 backdrop-blur-md border-b border-stone-200/50 dark:border-stone-800/50 px-4 py-3 flex items-center justify-between shadow-sm">
                                <div className="flex items-center gap-2 min-w-0">
                                    <div className="w-8 h-8 bg-teal-600 rounded-xl flex items-center justify-center text-white shadow-lg shrink-0"><Icon name="calendar" size={18} /></div>
                                    <div className="flex items-center gap-2 overflow-hidden">
                                        <h1 className="text-[14px] font-black text-stone-800 dark:text-stone-200 tracking-tighter truncate shrink-0">H무디</h1>

                                        <div className="flex items-center gap-1.5 ml-1 pl-2 border-l border-stone-200 dark:border-stone-700">
                                            <button
                                                onClick={() => { setViewMode('shared'); setCurrentDate(new Date()); }}
                                                className="flex items-center justify-center p-2 text-stone-500 hover:text-teal-600 transition-colors bg-white dark:bg-stone-800 rounded-full shadow-sm btn-press"
                                                title="파트너스 채널"
                                            >
                                                <Icon name="externalLink" size={16} />
                                                <span className="hidden sm:inline text-[10px] font-bold ml-1">파트너스 채널</span>
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex items-center gap-1.5 shrink-0 ml-2">
                                    <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2 bg-white dark:bg-stone-800 text-stone-400 hover:text-amber-500 rounded-full shadow-sm btn-press transition-colors">
                                        {isDarkMode ? <Icon name="sun" size={14} /> : <Icon name="moon" size={14} />}
                                    </button>

                                    {appUser ? (
                                        <div className="flex items-center gap-1.5 bg-white dark:bg-stone-800 px-3 py-1.5 rounded-full border border-stone-200 dark:border-stone-700 shadow-sm">
                                            <button
                                                onClick={() => { setShowProfileEdit(true); setProfileTab('info'); setProfileForm({ name: appUser.name, part: appUser.part, category: appUser.category, brands: appUser.brands || '', extNumber: appUser.extNumber || '', position: appUser.position, jobTitle: appUser.jobTitle || '일반', password: '', targetEmpId: appUser.empId }); }}
                                                className="flex items-center gap-1 text-[10px] font-black text-stone-600 dark:text-stone-300 hover:text-teal-600 transition-colors btn-press"
                                            >
                                                <span className="underline decoration-stone-300 dark:decoration-stone-600 underline-offset-2">{appUser.name}</span>
                                                <span className="hidden xs:inline">님</span>
                                            </button>

                                            <div className="w-px h-3 bg-stone-200 dark:bg-stone-700 mx-0.5"></div>

                                            <button
                                                onClick={() => { setShowProfileEdit(true); setProfileTab('pw'); }}
                                                className="text-stone-400 hover:text-teal-500 transition-colors flex items-center gap-1"
                                            >
                                                <Icon name="user" size={12} />
                                                <span className="hidden sm:inline text-[10px] font-bold">내 정보</span>
                                            </button>

                                            <button
                                                onClick={() => {
                                                    setAppUser(null);
                                                    setIsAdminAuth(false); // ✨ 핵심: 관리자 권한도 즉시 회수!
                                                    localStorage.removeItem('hmood_session');
                                                    setViewMode('login');
                                                    showToast('로그아웃 되었습니다.');
                                                }}
                                                className="text-stone-400 hover:text-rose-500 transition-colors flex items-center gap-1 pl-1"
                                            >
                                                <Icon name="logout" size={12} />
                                            </button>
                                        </div>
                                    ) : null}
                                </div>
                            </header>
                        )}

                        <main className={`flex-1 overflow-y-auto scrollbar-hide relative z-0 pb-24 ${viewMode === 'monthly' ? 'p-2 md:p-3' : 'p-4'}`}>
                            <div className={`mx-auto ${viewMode === 'login' ? 'max-w-md' : viewMode === 'monthly' ? 'max-w-full' : 'max-w-5xl'}`}>

                                {/* LOGIN VIEW */}
                                {viewMode === 'login' && (
                                    <div className="bg-white dark:bg-stone-900 p-8 sm:p-12 rounded-[3.5rem] sm:rounded-[4rem] shadow-2xl border border-stone-200 dark:border-stone-800 mt-4 sm:mt-10 max-w-md mx-auto fade-in">
                                        <div className="text-center mb-8 leading-none">
                                            <div className="bg-teal-600 w-20 h-20 sm:w-24 sm:h-24 rounded-[2.5rem] sm:rounded-[3rem] mx-auto mb-6 flex items-center justify-center text-white shadow-xl"><Icon name="user" size={40} /></div>
                                            <h2 className="text-2xl sm:text-3xl font-black tracking-tighter text-stone-800 dark:text-stone-200">H무디 로그인</h2>
                                        </div>
                                        <div className="bg-teal-50 dark:bg-teal-900/30 border border-teal-100 dark:border-teal-800 p-4 rounded-2xl mb-6 text-center">
                                            <p className="text-[11px] font-bold text-teal-700 dark:text-teal-400 leading-relaxed">사원번호를 입력하여 로그인하세요.<br />초기 비밀번호는 <b>사번과 동일</b>합니다.<br />로그인 후 우측 상단 '내 정보'에서 비밀번호를 변경해 주세요.<br /><span className="text-[9px] text-teal-500">(변경하지 않아도 시스템 사용은 가능합니다.)</span></p>
                                        </div>

                                        <form className="space-y-5 sm:space-y-6" onSubmit={handleLogin}>
                                            <div className="space-y-2 text-left">
                                                <label className="text-[11px] font-black text-stone-400 ml-4">사원번호</label>
                                                <input type="text" className="w-full bg-stone-50 dark:bg-stone-800 border border-stone-200 dark:border-stone-700 rounded-[2rem] px-6 py-4 sm:px-7 sm:py-5 font-bold text-[13px] shadow-inner outline-none focus:border-teal-500 transition-colors" placeholder="사번 입력" value={loginForm.id || ''} onChange={e => setLoginForm({ ...loginForm, id: e.target.value })} required />
                                            </div>
                                            <div className="space-y-2 text-left">
                                                <label className="text-[11px] font-black text-stone-400 ml-4">비밀번호</label>
                                                <input type="password" className="w-full bg-stone-50 dark:bg-stone-800 border border-stone-200 dark:border-stone-700 rounded-[2rem] px-6 py-4 sm:px-7 sm:py-5 font-bold text-[13px] shadow-inner outline-none focus:border-teal-500 transition-colors" placeholder="비밀번호" value={loginForm.pw || ''} onChange={e => setLoginForm({ ...loginForm, pw: e.target.value })} required />
                                            </div>
                                            <div className="flex items-center justify-between px-4 pt-2">
                                                <label className="flex items-center gap-2 cursor-pointer group">
                                                    <input type="checkbox" checked={rememberMe} onChange={e => setRememberMe(e.target.checked)} className="w-4 h-4 text-teal-600 bg-stone-100 border-stone-300 rounded focus:ring-teal-500" />
                                                    <span className="text-[11px] font-bold text-stone-500 group-hover:text-stone-700 transition-colors">사원번호 기억하기</span>
                                                </label>
                                            </div>
                                            <button className="w-full bg-stone-800 hover:bg-stone-900 text-white font-black py-4 sm:py-5 rounded-[2rem] shadow-xl mt-6 btn-press text-[14px] tracking-widest transition-colors">접속하기</button>
                                        </form>

                                        <div className="text-center mt-6">
                                            <button type="button" onClick={() => setViewMode('shared')} className="text-[12px] text-stone-400 hover:text-teal-500 font-bold underline underline-offset-2 flex items-center justify-center gap-1.5 mx-auto btn-press"><Icon name="externalLink" size={14} /> 파트너스 채널로 이동</button>
                                        </div>

                                        <div className="mt-6 text-center border-t border-stone-100 dark:border-stone-800 pt-5 fade-in">
                                            <button
                                                type="button"
                                                onClick={async () => {
                                                    const pin = prompt('관리자 마스터 PIN을 입력하세요.');
                                                    if (!pin) return;

                                                    const savedHash = localStorage.getItem('hmood_master_pin_hash');
                                                    const inputHash = typeof hashPassword === 'function' ? await hashPassword(pin) : pin;

                                                    if ((!savedHash && pin === '6011') || savedHash === inputHash) {
                                                        setIsAdminAuth(true);
                                                        setAppUser({ empId: 'admin_master', name: '시스템 관리자', jobTitle: '최고 관리자', part: '시스템관리', position: '마스터' });
                                                        setViewMode('daily');
                                                        if (typeof showToast === 'function') showToast('최고 관리자 모드로 접속했습니다.');
                                                    } else {
                                                        if (typeof showToast === 'function') showToast('PIN 번호가 일치하지 않습니다.', true);
                                                        else alert('PIN 번호가 일치하지 않습니다.');
                                                    }
                                                }}
                                                className="text-[11px] font-black text-stone-400 hover:text-teal-600 transition-colors btn-press flex items-center justify-center gap-1.5 mx-auto"
                                            >
                                                <Icon name="shield" size={13} /> 시스템 관리자 전용 로그인
                                            </button>
                                        </div>
                                    </div>
                                )}

                                {/* SHARED VIEW */}
                                {viewMode === 'shared' && (
                                    <div className="space-y-5 max-w-2xl mx-auto pb-10 mt-2 fade-in">
                                        <div className="sticky top-[-1rem] -mx-4 px-6 py-4 z-40 bg-[#EBE9E4]/95 dark:bg-stone-950/95 backdrop-blur-md border-b border-stone-200/50 dark:border-stone-800/50 flex justify-between items-center mb-4">
                                            <div className="flex items-center gap-2">
                                                <h2 className="text-xl font-black flex items-center gap-2 text-stone-800 dark:text-stone-200">
                                                    <Icon name="shield" className="text-teal-600" size={24} /> 파트너스 채널
                                                </h2>
                                                <button onClick={() => handleNavClick('daily')} className="bg-stone-800 dark:bg-stone-700 text-white p-1.5 rounded-lg shadow flex items-center justify-center btn-press ml-1 transition-transform" title="직영채널 이동">
                                                    <Icon name="calendar" size={16} />
                                                </button>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => setIsDarkMode(!isDarkMode)} className="bg-white dark:bg-stone-800 p-2.5 rounded-full shadow-md text-stone-400 hover:text-amber-500 btn-press transition-colors">
                                                    {isDarkMode ? <Icon name="sun" size={16} /> : <Icon name="moon" size={16} />}
                                                </button>
                                                <button onClick={() => { navigator.clipboard.writeText(window.location.origin + window.location.pathname + '?mode=shared'); showToast('복사 완료') }} className="bg-white dark:bg-stone-800 p-2.5 rounded-full shadow-md text-stone-400 hover:text-teal-600 btn-press"><Icon name="copy" size={16} /></button>
                                            </div>
                                        </div>

                                        {(dynamicApps || []).filter(a => !a.parentId && a.actionType?.startsWith('widget_') && (a.sortOrder || 99) < 100).sort((a, b) => (a.sortOrder || 99) - (b.sortOrder || 99)).map(app => app.actionType === 'widget_board' ? renderWidgetBoard(app) : renderWidget(app))}

                                        <div className="bg-white dark:bg-stone-900 rounded-[2rem] p-5 sm:p-6 shadow-sm border border-stone-200/60 dark:border-stone-800 mt-4">
                                            <h3 className="text-xs font-black flex items-center gap-2 text-stone-700 dark:text-stone-300 mb-4">채널 퀵 메뉴</h3>
                                            <div className="grid grid-cols-4 sm:grid-cols-5 gap-3 sm:gap-4 w-full">
                                                {(dynamicApps || [])
                                                    .filter(a => !a.parentId && (!a.actionType || !a.actionType.startsWith('widget_')))
                                                    .sort((a, b) => (a.sortOrder || 99) - (b.sortOrder || 99))
                                                    .map((app) => (
                                                        <button key={app.id} className="flex flex-col items-center gap-2 group w-full btn-press" onClick={() => handleAppClick(app)}>
                                                            <div className={`w-14 h-14 sm:w-16 sm:h-16 ${app.bg} ${app.color} rounded-[1.2rem] shadow-sm flex items-center justify-center transition-all group-hover:shadow-md relative`}>
                                                                <Icon name={app.icon} size={26} className="transition-colors" />

                                                                {app.isFolder && <div className="absolute top-0 right-0 w-3.5 h-3.5 bg-white border border-stone-200 rounded-full flex items-center justify-center"><div className="w-1.5 h-1.5 bg-stone-300 rounded-full" /></div>}

                                                                {(app.actionType === 'widget_notices' || app.actionType === 'notice' || app.actionType === 'admin_board') && (() => {
                                                                    const unread = app.actionType === 'widget_notices'
                                                                        ? (notices || []).filter(n => !readNoticeIds.includes(n.id)).length
                                                                        : (dynamicPosts || []).filter(p => p.appId === app.id && p.type === 'admin_board' && !readNoticeIds.includes(p.id)).length;
                                                                    return unread > 0 ? <span className="absolute -top-1.5 -right-1.5 bg-rose-500 text-white text-[9px] font-black rounded-full min-w-[17px] h-[17px] flex items-center justify-center px-1 shadow z-10">{unread > 9 ? '9+' : unread}</span> : null;
                                                                })()}

                                                                {app.actionType !== 'widget_notices' && app.actionType !== 'notice' && app.actionType !== 'admin_board' && checkNewBadge(app.id) && (
                                                                    <span className="absolute -top-1 -right-1 flex h-4 w-4 sm:h-5 sm:w-5 items-center justify-center rounded-full bg-rose-500 text-[9px] sm:text-[10px] font-black text-white shadow-md ring-2 ring-white dark:ring-stone-900 z-10 animate-pulse">N</span>
                                                                )}
                                                            </div>
                                                            <span className="text-[10px] sm:text-[11px] font-black text-stone-600 tracking-tighter whitespace-nowrap overflow-hidden text-ellipsis w-full text-center">{app.name}</span>
                                                        </button>
                                                    ))}
                                            </div>
                                        </div>

                                        {(dynamicApps || []).filter(a => !a.parentId && a.actionType?.startsWith('widget_') && (a.sortOrder || 99) >= 100).sort((a, b) => (a.sortOrder || 99) - (b.sortOrder || 99)).map(app => app.actionType === 'widget_board' ? renderWidgetBoard(app) : renderWidget(app))}
                                    </div>
                                )}

                                {/* DAILY VIEW */}
                                {viewMode === 'daily' && (
                                    <div className="space-y-4 fade-in">
                                        {todayBirthdays.length > 0 && <div className="bg-gradient-to-r from-rose-400 to-amber-400 rounded-2xl p-4 shadow-lg text-white flex items-center gap-2 animate-bounce"><Icon name="gift" size={18} className="ml-1" /><p className="text-[12px] font-black">오늘 생일: {todayBirthdays.map(u => u.name).join(', ')} 🥳 축하합니다!</p></div>}
                                        <div className="bg-white dark:bg-stone-900 p-3 rounded-2xl border border-stone-200 dark:border-stone-800 flex items-center justify-between shadow-sm max-w-4xl mx-auto relative">
                                            <button onClick={() => { const d = new Date(currentDate); d.setDate(d.getDate() - 1); setCurrentDate(d); }} className="p-2 bg-stone-50 dark:bg-stone-800 hover:bg-stone-100 dark:hover:bg-stone-700 rounded-xl transition-all btn-press"><Icon name="chevronLeft" size={20} /></button>
                                            <div className="text-center leading-tight flex flex-col justify-center items-center">
                                                <p className={`text-[10px] tracking-widest font-black mb-1 ${isRedDay(currentDate.getFullYear(), currentDate.getMonth() + 1, currentDate.getDate()) ? 'text-rose-500' : 'text-teal-600'}`}>
                                                    {currentDate.toLocaleDateString('ko-KR', { weekday: 'long' })}
                                                </p>
                                                <div className="flex items-center justify-center gap-2">
                                                    <p className={`text-xl font-black ${isRedDay(currentDate.getFullYear(), currentDate.getMonth() + 1, currentDate.getDate()) ? 'text-rose-600' : 'text-stone-800 dark:text-stone-200'}`}>
                                                        {todayStr}
                                                    </p>
                                                    <button onClick={() => setCurrentDate(new Date())} className="p-1.5 bg-stone-50 dark:bg-stone-800 text-teal-600 border border-stone-200 dark:border-stone-700 rounded-lg btn-press">
                                                        <Icon name="calendarToday" size={16} />
                                                    </button>
                                                </div>
                                            </div>
                                            <button onClick={() => { const d = new Date(currentDate); d.setDate(d.getDate() + 1); setCurrentDate(d); }} className="p-2 bg-stone-50 dark:bg-stone-800 hover:bg-stone-100 dark:hover:bg-stone-700 rounded-xl transition-all btn-press"><Icon name="chevronRight" size={20} /></button>
                                        </div>
                                        <div className="bg-white dark:bg-stone-900 rounded-2xl border border-stone-200 dark:border-stone-800 flex items-center gap-2 px-4 py-2.5 shadow-sm max-w-4xl mx-auto focus-within:border-teal-500 transition-colors">
                                            <Icon name="search" size={15} className="text-stone-400 shrink-0" />
                                            <input type="text" placeholder="이름, 카테고리, 브랜드 검색..." value={dailySearch} onChange={e => setDailySearch(e.target.value)} className="w-full bg-transparent outline-none text-[12px] font-bold text-stone-700 dark:text-stone-300 placeholder-stone-400" />
                                            {dailySearch && <button onClick={() => setDailySearch('')} className="text-stone-300 hover:text-stone-500 font-black text-[12px]">✕</button>}
                                        </div>

                                        <div className="grid grid-cols-1 pb-20 gap-4">
                                            {(() => {
                                                const q = dailySearch.toLowerCase().trim();

                                                // 1. 모든 멤버를 하나의 리스트로 모으기
                                                let allMembers = [];
                                                sortedDailyGroups.forEach(([part, members]) => {
                                                    members.forEach(m => allMembers.push(m));
                                                });

                                                // 2. 검색어 필터링
                                                if (q) {
                                                    allMembers = allMembers.filter(m => {
                                                        const u = userMap[m.empId];
                                                        return (m.name || '').toLowerCase().includes(q) ||
                                                            (u?.category || '').toLowerCase().includes(q) ||
                                                            (u?.brands || '').toLowerCase().includes(q);
                                                    });
                                                }

                                                if (allMembers.length === 0) return <div className="col-span-full py-12 text-center text-stone-400 font-bold text-sm bg-white dark:bg-stone-900 rounded-3xl border border-stone-200 dark:border-stone-800 border-dashed">{q ? `"${q}" 검색 결과가 없습니다.` : '해당 날짜에 출근한 인원이 없습니다.'}</div>;

                                                // 3. 그룹 재편성 (점장님은 무조건 '점장' 파트로 분리)
                                                const newGroups = {};
                                                allMembers.forEach(m => {
                                                    const u = userMap[m.empId] || m;
                                                    const isManager = u.position === '점장' || u.jobTitle === '점장' || u.category === '점장';
                                                    const partName = isManager ? '점장' : (u.part || '기타');

                                                    if (!newGroups[partName]) newGroups[partName] = [];
                                                    newGroups[partName].push(m);
                                                });

                                                // 4. 파트(덩어리) 순서 정렬
                                                const finalGroups = Object.entries(newGroups).sort(([partA], [partB]) => {
                                                    if (partA === '점장') return -1;
                                                    if (partB === '점장') return 1;

                                                    const getPartScore = (pName) => {
                                                        if (pName.includes('영업1')) return 10;
                                                        if (pName.includes('영업2')) return 20;
                                                        if (pName.includes('고객')) return 30;
                                                        return 99;
                                                    };
                                                    return getPartScore(partA) - getPartScore(partB);
                                                });

                                                // 5. 화면에 그리기
                                                return finalGroups.map(([part, members]) => (
                                                    <div key={part} className="space-y-2 w-full">
                                                        <h3 className="text-[11px] font-black flex items-center gap-2 tracking-tighter ml-1 text-stone-700 dark:text-stone-300">
                                                            <div className="w-1.5 h-3 bg-teal-500 rounded-full" />
                                                            {part}
                                                        </h3>
                                                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2">
                                                            {/* 6. 파트 내 멤버 정렬 (직급 -> 이름 가나다순) */}
                                                            {members.sort((a, b) => {
                                                                const uA = userMap[a.empId] || a;
                                                                const uB = userMap[b.empId] || b;
                                                                const diff = getMemberPriority(uA) - getMemberPriority(uB);
                                                                return diff !== 0 ? diff : (uA.name || '').localeCompare(uB.name || '');
                                                            }).map(m => {
                                                                const u = userMap[m.empId]; const canEdit = canEditProfile(m.empId);
                                                                const hasDetail = u?.category || u?.brands;
                                                                const extNum = u?.extNumber || (extensions || []).find(e => e?.user?.includes(m.name))?.number;
                                                                return (
                                                                    <div key={m.empId} className={`bg-white dark:bg-stone-900 p-2.5 sm:p-3 rounded-2xl shadow-sm border flex flex-col justify-between ${canEdit ? 'border-teal-500/40 ring-1 ring-teal-500/10' : 'border-stone-100 dark:border-stone-800'}`}>
                                                                        <div className="flex items-center justify-between mb-1.5 gap-1">
                                                                            <div className="flex items-baseline gap-1 min-w-0">
                                                                                <span className="text-[12px] sm:text-[13px] font-black text-stone-800 dark:text-stone-200 truncate">{m.name}</span>
                                                                                <span className="text-[9px] text-stone-400 font-bold shrink-0">{u?.position}</span>
                                                                            </div>
                                                                            {u?.jobTitle !== '일반' && <span className="text-[8px] text-teal-600 font-bold truncate bg-teal-50 dark:bg-teal-900/30 px-1 rounded shrink-0">{u?.jobTitle}</span>}
                                                                        </div>
                                                                        {hasDetail && (
                                                                            <div className="bg-stone-50 dark:bg-stone-800 p-1.5 rounded-lg border border-stone-100 dark:border-stone-700 mb-2">
                                                                                <p className="text-[10px] font-black text-stone-700 dark:text-stone-300 truncate">{u?.category || '-'}</p>
                                                                                {u?.brands && (
                                                                                    <p className={`text-[9px] font-black text-teal-700 cursor-pointer transition-all ${expandedDailyCards[m.empId] ? 'whitespace-pre-wrap break-all' : 'truncate'}`} onClick={(e) => { e.stopPropagation(); setExpandedDailyCards(prev => ({ ...prev, [m.empId]: !prev[m.empId] })); }}>{u.brands}</p>
                                                                                )}
                                                                            </div>
                                                                        )}
                                                                        <div className="flex items-center justify-between mt-auto gap-1">
                                                                            {extNum ? <button onClick={e => { e.stopPropagation(); callExtension(extNum, m.name, e); }} className="text-white bg-teal-500 hover:bg-teal-600 p-1.5 rounded-full btn-press shadow-sm shrink-0"><Icon name="phoneCall" size={10} /></button> : <div />}
                                                                            {canEdit ? (
                                                                                <select className="text-[10px] font-black bg-stone-50 dark:bg-stone-800 border border-stone-200 dark:border-stone-700 rounded-lg px-1 py-1 outline-none focus:border-teal-500 cursor-pointer shadow-sm min-w-0 text-center flex-1 ml-1" value={m.status} onChange={(e) => handleUpdateDuty(m.empId, todayStr, e.target.value, isAdminAuth)}>
                                                                                    <option value="" disabled className="bg-white dark:bg-stone-800 text-stone-700 dark:text-stone-300">-</option>
                                                                                    {SCHED_STATUS_OPTIONS.map(opt => <option key={opt} value={opt} className="bg-white dark:bg-stone-800 text-stone-700 dark:text-stone-300">{opt}</option>)}
                                                                                </select>
                                                                            ) : (<div className={`px-2 py-1 rounded-md text-[9px] font-black shadow-sm truncate flex-1 text-center ml-1 ${STATUS_THEME[m.status] || 'bg-stone-100 text-stone-400'}`}>{m.status}</div>)}
                                                                        </div>
                                                                    </div>
                                                                );
                                                            })}
                                                        </div>
                                                    </div>
                                                ));
                                            })()}
                                        </div>
                                    </div>
                                )}

                                {/* MONTHLY VIEW */}
                                {viewMode === 'monthly' && (
                                    <div className="bg-[#F9F8F6] dark:bg-stone-900 rounded-[2.5rem] shadow-xl border border-stone-200 dark:border-stone-800 fade-in">
                                        <div className="p-4 md:p-6 bg-stone-800 text-white flex flex-col sm:flex-row justify-between items-center gap-4">
                                            <div className="flex items-center gap-4 w-full sm:w-auto justify-between"><h3 className="text-[13px] font-black flex items-center gap-1.5"><Icon name="calendar" size={16} className="text-teal-400" /> 월간 스케줄</h3><div className="flex gap-4 items-center font-black bg-stone-700/50 px-2 py-1 rounded-xl"><button onClick={() => { const d = new Date(currentDate); d.setMonth(d.getMonth() - 1); d.setDate(1); setCurrentDate(d); }} className="p-1.5 hover:bg-stone-600 rounded-lg"><Icon name="chevronLeft" size={18} /></button><span className="text-[13px]">{currentDate.getFullYear()}.{currentDate.getMonth() + 1}</span><button onClick={() => { const d = new Date(currentDate); d.setMonth(d.getMonth() + 1); d.setDate(1); setCurrentDate(d); }} className="p-1.5 hover:bg-stone-600 rounded-lg"><Icon name="chevronRight" size={18} /></button></div></div>
                                            <div className="flex flex-wrap gap-2 text-[10px] font-black w-full sm:w-auto">
                                                <select value={viewMode} onChange={(e) => setViewMode(e.target.value)} className="bg-stone-700 text-white px-3 py-1.5 rounded-lg outline-none cursor-pointer border border-stone-600">
                                                    <option value="all">전체 보기</option>{appUser && <option value="me">내 스케줄만</option>}

                                                    {uniqueParts.filter(p => p !== 'all' && p !== '').map(p => <option key={p} value={`PART_${p}`}>{p}</option>)}
                                                </select>
                                                <button onClick={() => setMonthlyFilters(t => ({ ...t, part: !t.part }))} className={`px-3 py-2 rounded-xl btn-press ${monthlyFilters.part ? 'bg-teal-500 text-white' : 'bg-white/10 text-stone-300'}`}>파트 표시</button><button onClick={() => setMonthlyFilters(t => ({ ...t, cat: !t.cat }))} className={`px-3 py-2 rounded-xl btn-press ${monthlyFilters.cat ? 'bg-teal-500 text-white' : 'bg-white/10 text-stone-300'}`}>카테고리 표시</button><button onClick={() => setMonthlyFilters(t => ({ ...t, id: !t.id }))} className={`px-3 py-2 rounded-xl btn-press ${monthlyFilters.id ? 'bg-teal-500 text-white' : 'bg-white/10 text-stone-300'}`}>사번 표시</button>
                                            </div>
                                        </div>
                                        <div ref={tableScrollRef} tabIndex="0" className="overflow-x-auto overflow-y-auto max-h-[70vh] md:max-h-[78vh] scrollbar-hide bg-white dark:bg-stone-900 rounded-b-[2.5rem] focus:outline-none">
                                            <table className="text-[11px] border-separate border-spacing-0" style={{ minWidth: 'max-content' }}>
                                                {(() => {
                                                    const daysInMonth = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0).getDate(); return (<>
                                                        <thead>
                                                            <tr className="bg-stone-100 dark:bg-stone-800 sticky top-0 z-40 font-black text-stone-600 dark:text-stone-300">
                                                                {monthlyFilters.part && <th className="p-2 text-left border-b border-stone-200 dark:border-stone-700" style={{ width: '90px', minWidth: '90px', maxWidth: '90px' }}>파트</th>}{monthlyFilters.cat && <th className="p-2 text-left border-b border-stone-200 dark:border-stone-700" style={{ width: '90px', minWidth: '90px', maxWidth: '90px' }}>카테고리</th>}{monthlyFilters.id && <th className="p-2 text-left border-b border-stone-200 dark:border-stone-700" style={{ width: '72px', minWidth: '72px', maxWidth: '72px' }}>사번</th>}
                                                                <th className="p-2 text-left sticky left-0 bg-stone-100 dark:bg-stone-800 z-50 border-b border-stone-200 dark:border-stone-700 shadow-[2px_0_5px_rgba(0,0,0,0.03)]" style={{ width: '110px', minWidth: '110px', maxWidth: '110px' }}>성명</th>
                                                                {[...Array(daysInMonth)].map((_, i) => {
                                                                    const dayNum = i + 1; const dateObj = new Date(currentDate.getFullYear(), currentDate.getMonth(), dayNum); const dayOfWeekStr = ['일', '월', '화', '수', '목', '금', '토'][dateObj.getDay()]; const isRed = isRedDay(currentDate.getFullYear(), currentDate.getMonth() + 1, dayNum);
                                                                    return (
                                                                        <th key={i} className={`p-1.5 border-l border-stone-200 dark:border-stone-700 text-center border-b border-stone-200 dark:border-stone-700 ${isRed ? 'text-rose-500 bg-rose-50/20' : 'text-stone-600 dark:text-stone-300'}`} style={{ width: '42px', minWidth: '42px', maxWidth: '42px' }}>
                                                                            <div className="text-[11px] leading-tight flex flex-col items-center"><span>{dayNum}</span><span className="text-[9px] opacity-70">{dayOfWeekStr}</span></div>
                                                                        </th>
                                                                    );
                                                                })}
                                                            </tr>
                                                        </thead>
                                                        <tbody>
                                                            {filteredMonthly
                                                                .sort((a, b) => {
                                                                    const diff = getMemberPriority(a) - getMemberPriority(b);
                                                                    return diff !== 0 ? diff : (a.name || '').localeCompare(b.name || '');
                                                                })
                                                                .map(u => (
                                                                    <tr key={u.empId} className="hover:bg-teal-50/40 dark:hover:bg-stone-800 transition-colors group">
                                                                        {monthlyFilters.part && <td className="p-2 border-b border-stone-100 dark:border-stone-800 text-stone-500 dark:text-stone-400 font-bold text-[11px] overflow-hidden" style={{ width: '90px', minWidth: '90px', maxWidth: '90px' }}><div className="truncate" title={u.part}>{u.part}</div></td>}{monthlyFilters.cat && <td className="p-2 border-b border-stone-100 dark:border-stone-800 text-teal-600 font-black text-[11px] overflow-hidden" style={{ width: '90px', minWidth: '90px', maxWidth: '90px' }}><div className="truncate" title={u.category}>{u.category}</div></td>}{monthlyFilters.id && <td className="p-2 border-b border-stone-100 dark:border-stone-800 text-stone-400 font-black text-[11px] overflow-hidden" style={{ width: '72px', minWidth: '72px', maxWidth: '72px' }}><div className="truncate">{u.empId}</div></td>}
                                                                        <td className="p-2 font-black sticky left-0 bg-white dark:bg-stone-900 group-hover:bg-teal-50/40 dark:group-hover:bg-stone-800 border-b border-stone-100 dark:border-stone-800 text-xs shadow-[2px_0_5px_rgba(0,0,0,0.02)] overflow-hidden" style={{ width: '110px', minWidth: '110px', maxWidth: '110px' }}><div className="truncate" title={u.name}>{u.name}</div><div className="text-[9px] text-stone-400 font-bold truncate">{u.jobTitle}</div></td>
                                                                        {[...Array(daysInMonth)].map((_, i) => {
                                                                            const dStr = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, '0')}-${String(i + 1).padStart(2, '0')}`; const s = scheduleMap[u.empId]?.[dStr]; const canEdit = canEditProfile(u.empId);
                                                                            return (
                                                                                <td key={i} className="p-0.5 border-b border-l border-stone-100 dark:border-stone-800 text-center" style={{ width: '42px', minWidth: '42px', maxWidth: '42px' }}>
                                                                                    {canEdit ? (
                                                                                        <select className={`w-full h-8 rounded-lg font-black text-[9px] shadow-sm outline-none cursor-pointer text-center appearance-none ${s ? STATUS_THEME[s.status] : 'bg-stone-50 dark:bg-stone-800 text-stone-400 hover:bg-stone-100 dark:hover:bg-stone-700'}`} style={s ? STATUS_INLINE_STYLE[s.status] : {}} value={s?.status || ''} onChange={(e) => handleUpdateDuty(u.empId, dStr, e.target.value, isAdminAuth)}>
                                                                                            <option value="" disabled className="bg-white dark:bg-stone-800 text-stone-700 dark:text-stone-300">-</option>{SCHED_STATUS_OPTIONS.map(opt => <option key={opt} value={opt} className="bg-white dark:bg-stone-800 text-stone-700 dark:text-stone-300">{opt}</option>)}
                                                                                        </select>
                                                                                    ) : (
                                                                                        <div className={`w-full h-8 rounded-lg flex items-center justify-center font-black text-[9px] shadow-sm overflow-hidden cursor-pointer select-none ${s ? STATUS_THEME[s.status] : 'bg-stone-50 dark:bg-stone-800 text-stone-200 dark:text-stone-600'}`} style={s ? STATUS_INLINE_STYLE[s.status] : {}} onClick={(e) => { if (!s) return; const rect = e.currentTarget.getBoundingClientRect(); setExpandedCell(prev => prev?.empId === u.empId && prev?.date === dStr ? null : { empId: u.empId, date: dStr, status: s.status, rect }); }}>
                                                                                            <span className="truncate px-0.5 w-full text-center leading-tight">{s?.status || '-'}</span>
                                                                                        </div>
                                                                                    )}
                                                                                </td>
                                                                            );
                                                                        })}
                                                                    </tr>
                                                                ))}
                                                        </tbody>
                                                    </>);
                                                })()}
                                            </table>
                                        </div>
                                    </div>
                                )}

                                {/* TASKS VIEW */}
                                {viewMode === 'tasks' && (
                                    <div className="space-y-4 fade-in max-w-5xl mx-auto">
                                        <div className="bg-white dark:bg-stone-900 p-4 rounded-3xl border border-stone-200 dark:border-stone-800 shadow-sm flex items-center gap-3 focus-within:border-teal-500"><Icon name="search" size={20} className="text-stone-400 ml-2 shrink-0" /><input type="text" placeholder="사번, 이름, 소속, 업무 검색..." className="w-full bg-transparent outline-none font-bold text-[13px] text-stone-700 dark:text-stone-300" value={profileSearch} onChange={e => setProfileSearch(e.target.value)} /></div>
                                        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3 pb-20">
                                            {searchedUsers.map(u => {
                                                const canEdit = canEditProfile(u.empId);
                                                const isExpanded = expandedProfiles[u.empId];
                                                const isManager = (u.jobTitle || '').includes('점장') || (u.jobTitle || '').includes('파트장') || (u.jobTitle || '').includes('영업관리자');
                                                return (
                                                    <div key={u.empId} className={`bg-white dark:bg-stone-900 p-4 rounded-[1.2rem] border shadow-sm cursor-pointer ${canEdit ? 'hover:border-teal-400' : ''} ${appUser?.empId === u.empId ? 'border-teal-500/50 shadow-md ring-2 ring-teal-500/10' : 'border-stone-200 dark:border-stone-800'}`} onClick={() => setExpandedProfiles({ ...expandedProfiles, [u.empId]: !isExpanded })}>
                                                        <div className="flex flex-col gap-2">
                                                            {/* 상단: 성함 및 직급 배지 영역 */}
                                                            <div className="flex justify-between items-start">
                                                                <div className="flex flex-col gap-1.5 min-w-0 flex-1">
                                                                    {/* 1. 성명: 한 줄로 깔끔하게 고정 (truncate) */}
                                                                    <span className="text-[15px] font-black text-stone-800 dark:text-stone-200 truncate" title={u.name}>
                                                                        {u.name}
                                                                    </span>

                                                                    {/* 2. 뱃지 영역: 직급과 직책을 나란히 배치 */}
                                                                    <div className="flex flex-wrap gap-1">
                                                                        {/* ✅ 직급 뱃지: 색상 변화 없이 차분한 회색 고정 */}
                                                                        <span className="text-[9px] font-bold px-1.5 py-0.5 rounded border bg-stone-50 text-stone-500 border-stone-100 dark:bg-stone-800/50 dark:border-stone-700 dark:text-stone-400">
                                                                            {u.position}
                                                                        </span>

                                                                        {/* ✅ 직책 뱃지: 사라졌던 점장, 파트장 등 복구 (일반 제외) */}
                                                                        {u.jobTitle && u.jobTitle !== '일반' && (
                                                                            <span className="text-[9px] font-black px-1.5 py-0.5 rounded border bg-stone-50 text-teal-600 border-stone-100 dark:bg-stone-800/50 dark:border-stone-700">
                                                                                {u.jobTitle}
                                                                            </span>
                                                                        )}
                                                                    </div>
                                                                </div>

                                                                {/* 수정 버튼: 성함 우측 상단 배치 */}
                                                                {canEdit && (
                                                                    <button
                                                                        onClick={(e) => {
                                                                            e.stopPropagation();
                                                                            setProfileForm({ name: u.name, part: u.part, category: u.category, brands: u.brands || '', extNumber: u.extNumber || '', position: u.position, jobTitle: u.jobTitle || '일반', password: '', targetEmpId: u.empId });
                                                                            setProfileTab('info');
                                                                            setShowProfileEdit(true);
                                                                        }}
                                                                        className="text-white bg-teal-500 hover:bg-teal-600 p-1.5 rounded-lg flex items-center justify-center btn-press shadow-sm shrink-0"
                                                                    >
                                                                        <Icon name="edit" size={14} />
                                                                    </button>
                                                                )}
                                                            </div>

                                                            {/* 하단: 소속 및 사번 정보 */}
                                                            <div className="flex items-center gap-2 pt-1 border-t border-stone-50 dark:border-stone-800/50">
                                                                <span className="text-[11px] font-bold text-stone-500 dark:text-stone-400">{u.part}</span>
                                                                <span className="text-[9px] font-bold text-stone-300 dark:text-stone-600 border-l border-stone-200 dark:border-stone-700 pl-2">사번: {u.empId}</span>
                                                            </div>
                                                        </div>

                                                        {/* 상세 업무 내용 영역 (기존 유지) */}
                                                        <div className="bg-stone-50 dark:bg-stone-800 p-2.5 rounded-xl border border-stone-100 dark:border-stone-700 mt-2 space-y-1.5">
                                                            <div className="flex justify-between items-center">
                                                                <p className="text-[9px] font-bold text-stone-400">카테고리</p>
                                                                <Icon name={isExpanded ? 'chevronLeft' : 'chevronRight'} size={12} className={`text-stone-300 transform transition-transform ${isExpanded ? '-rotate-90' : 'rotate-90'}`} />
                                                            </div>
                                                            <p className={`text-[11px] font-black text-stone-700 dark:text-stone-300 leading-snug ${isExpanded ? 'line-clamp-none' : 'line-clamp-1'}`}>
                                                                {u.category || '-'}
                                                            </p>
                                                            {u.brands && (
                                                                <>
                                                                    <p className="text-[9px] font-bold text-teal-500 mt-1">담당 브랜드</p>
                                                                    <p className={`text-[11px] font-black text-teal-700 dark:text-teal-400 leading-snug whitespace-pre-wrap break-words ${isExpanded ? 'line-clamp-none' : 'line-clamp-1'}`}>
                                                                        {u.brands}
                                                                    </p>
                                                                </>
                                                            )}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )}

                                {/* DIRECTORY VIEW */}

                                                        </div>
                                                        <div className="pt-10 pb-2 flex flex-col items-center">
                                                            <p className="text-[10px] font-bold text-stone-400 mb-2">입력한 내용을 모두 지우고 싶으신가요?</p>

                                                                onClick={() => {
                                                                    if (confirm('입력 중인 모든 내용을 지우고 초기화할까요?')) {
                                                                        setMemberForm({
                                                                            empId: '', name: '', part: '', position: '',
                                                                            category: '', jobTitle: '일반', brands: '', password: ''
                                                                        });
                                                                        showToast('입력창이 깨끗하게 비워졌습니다.');
                                                                    }
                                                                }}
                                                                className="text-[11px] font-black text-stone-400 underline underline-offset-4 hover:text-rose-400 transition-colors btn-press"

                                                            </button>
                                                        </div>
                                                        <div className="bg-white dark:bg-stone-900 p-6 rounded-[2.5rem] border border-stone-200 dark:border-stone-800">
                                                            <div className="space-y-4 mb-4">
                                                                {/* ✨ 넓고 편리해진 검색창 */}
                                                                <div className="relative">
                                                                    <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">

                                                                    </div>
                                                                    <input
                                                                        type="text"
                                                                        className="w-full bg-stone-50 dark:bg-stone-800 border border-stone-100 dark:border-stone-700 rounded-2xl pl-11 pr-10 py-3.5 text-[12px] font-bold outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/10 transition-all shadow-sm"

                                                                        <button
                                                                            onClick={() => setAdminMemberSearch('')}

                                                                        <span className="text-[10px] font-bold text-indigo-500 animate-pulse">검색 필터 적용 중</span>
                                                                    )}

                                                            </div>

                                                            <div className="space-y-2 pb-10">
                                                                {filteredAdminMembers
                                                                    .sort((a, b) => getMemberPriority(a) - getMemberPriority(b))

                                                                        const isManager = (u.jobTitle || '').includes('점장') || (u.part || '').includes('점장') || (u.jobTitle || '').includes('영업관리자');

                                                                                        <span className="text-[12px] font-black text-stone-700 dark:text-stone-300 break-all leading-tight">{u.part}</span>

                                                                                            {u.position}{u.jobTitle !== '일반' ? ` / ${u.jobTitle}` : ''}
                                                                                        </span>
                                                                                    </div>

                                                                                    <button onClick={() => { setMemberForm({ ...u, password: '' }); window.scrollTo({ top: 0, behavior: 'smooth' }); }} className="text-white bg-teal-500 hover:bg-teal-600 p-2.5 rounded-xl btn-press shadow-sm"><Icon name="edit" size={16} /></button>
                                                                                    /* --- 수정된 삭제 버튼 코드 --- */
                                                                                    <button
                                                                                        type="button" // 👈 1. 폼 전송(새로고침)을 방지하는 핵심 설정입니다!
                                                                                        onClick={(e) => {
                                                                                            e.preventDefault();  // 👈 2. 브라우저의 기본 동작을 막습니다.
                                                                                            e.stopPropagation(); // 👈 3. 부모 요소의 클릭 이벤트가 실행되지 않게 막습니다.
                                                                                            handleDeleteMember(u.empId);
                                                                                        }}
                                                                                        className="text-white bg-rose-400 hover:bg-rose-500 p-2.5 rounded-xl btn-press shadow-sm"
                                                                                    >
                                                                                        <Icon name="trash" size={16} />
                                                                                    </button>
                                                                                </div>
                                                                            </div>
                                                                        );
                                                                    })}
                                                            </div>
                                                        </div>
                                                    </div>
                                                )}

                                                {/* 2. 관리자 탭 - 제출 데이터 섹션 */}
                                                {currentAdminTab === 'posts' && (
                                                    <div className="space-y-6 fade-in">
                                                        <div className="bg-[#F9F8F6] dark:bg-stone-800/50 p-6 rounded-[2.5rem] border border-stone-200 dark:border-stone-700 space-y-4 shadow-inner">
                                                            <div className="flex items-center justify-between px-1">
                                                                <p className="text-[12px] font-black text-indigo-600 tracking-widest flex items-center gap-2">
                                                                    <Icon name="clipboardList" size={18} /> 게시판/폼 데이터 조회
                                                                </p>
                                                                <span className="text-[10px] text-stone-400 font-bold">총 {dynamicApps.filter(a => ['board', 'form', 'notice', 'reservation'].includes(a.actionType)).length}개 앱</span>
                                                            </div>

                                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                                                {(dynamicApps || [])
                                                                    .filter(a => ['board', 'form', 'notice', 'reservation'].includes(a.actionType)

                                                                    .map(app => {

                                                                        const canView = canViewPosts(app);

                                                                        return (
                                                                            <div
                                                                                key={app.id}

                                                                                    }`}
                                                                                onClick={() => {
                                                                                    if (!canView) return showToast('열람 권한이 없습니다.', true);
                                                                                    if (app.actionType === 'notice') {
                                                                                        setOpenedAdminBoard(app);
                                                                                        setSelectedAdminPost(null);
                                                                                    } else if (app.actionType === 'reservation') {
                                                                                        setOpenedReservationApp(app);
                                                                                        setResSelectedDate(todayStr);
                                                                                        setResConfigMode(false);
                                                                                    } else {
                                                                                        setOpenedDynamicApp(app);
                                                                                    }
                                                                                }}

                                                                                        <Icon name={app.icon} size={18} />
                                                                                    </div>

                                                                </div>

                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </div>

                        </main>

                        {/* ✅ N뱃지 기준 새 소식 팝업 (완성본) */}

                            <ModalWrapper

                                onClose={() => setShowNewPostPopup(false)}
                            >
                                <div className="space-y-3">
                                    {unreadPopupTargets.slice(0, 5).map(app => (
                                        <button
                                            key={app.id}
                                            onClick={() => {
                                                // 1. 폴더 안에 있는 앱이면 폴더부터 열어줌
                                                if (app.parentId) {
                                                    const folder = dynamicApps.find(f => String(f.id) === String(app.parentId));
                                                    if (folder) setOpenedFolder(folder);
                                                }

                                                // 2. 앱 화면 실행 (안내형/게시판형에 맞는 화면)
                                                handleAppClick(app);

                                                // 3. 💥 안내형 데이터(`notices`) 읽음 처리
