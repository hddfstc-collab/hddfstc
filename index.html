        const RouletteWheel = ({ names, rotation }) => {
            const n = names.length;
            if (!n) return null;
            const size = 260, cx = size/2, cy = size/2, r = size/2 - 6;
            const COLORS = ['#0d9488','#f43f5e','#f59e0b','#6366f1','#10b981','#8b5cf6','#f97316','#06b6d4','#84cc16','#ec4899','#14b8a6','#a855f7'];
            const angle = (2*Math.PI)/n;
            const sectors = names.map((name, i) => {
                const s = i*angle - Math.PI/2, e = s + angle;
                const x1=cx+r*Math.cos(s), y1=cy+r*Math.sin(s), x2=cx+r*Math.cos(e), y2=cy+r*Math.sin(e);
                const mid = s + angle/2, tr = r*0.60;
                return { path:`M${cx},${cy}L${x1},${y1}A${r},${r},0,${angle>Math.PI?1:0},1,${x2},${y2}Z`, color:COLORS[i%COLORS.length], tx:cx+tr*Math.cos(mid), ty:cy+tr*Math.sin(mid), rot:(mid*180/Math.PI)+90, label:name.length>5?name.slice(0,5):name };
            });
            return (
                <div className="relative inline-flex flex-col items-center">
                    <div className="absolute -top-3 left-1/2 z-10 -translate-x-1/2">
                        <div className="w-0 h-0 border-l-[11px] border-r-[11px] border-t-[18px] border-l-transparent border-r-transparent border-t-amber-400 drop-shadow"/>
                    </div>
                    <svg width={size} height={size} style={{transform:`rotate(${rotation}deg)`,transition:'transform 4s cubic-bezier(0.17,0.67,0.12,0.99)'}}>
                        {sectors.map((s,i) => (
                            <g key={i}>
                                <path d={s.path} fill={s.color} stroke="rgba(255,255,255,0.4)" strokeWidth="1.5"/>
                                {n <= 20 && <text x={s.tx} y={s.ty} textAnchor="middle" dominantBaseline="middle" fill="white" fontSize={n>12?7:9} fontWeight="900" transform={`rotate(${s.rot},${s.tx},${s.ty})`}>{s.label}</text>}
                            </g>
                        ))}
                        <circle cx={cx} cy={cy} r={16} fill="white" stroke="#e2e8f0" strokeWidth="3"/>
                        <circle cx={cx} cy={cy} r={9} fill="#0d9488"/>
                    </svg>
                </div>
            );

                                {canManageWidgetBoard && <button onClick={() => { setWBoardForm({ title:'', content:'', photo:'' }); setWBoardEditId(null); setWBoardOpenId(wBoardOpenId === app.id ? null : app.id); }} className="text-[10px] font-black text-teal-600 bg-teal-50 dark:bg-teal-900/20 hover:bg-teal-100 px-3 py-1.5 rounded-lg btn-press transition-colors">{wBoardOpenId===app.id?'닫기':'글쓰기'}</button>}
                                {isAdminAuth && <button onClick={() => handleEditDynamicApp(app)} className="text-stone-400 hover:text-teal-500"><Icon name="edit" size={14}/></button>}
                                {isAdminAuth && <button onClick={() => handleDeleteDynamicApp(app.id)} className="text-stone-400 hover:text-rose-500"><Icon name="trash" size={14}/></button>}
                            </div>
                        </div>
                        {wBoardOpenId === app.id && canManageWidgetBoard && (
                            <div className="bg-stone-50 dark:bg-stone-800 p-4 rounded-2xl border border-stone-200 dark:border-stone-700 space-y-3 fade-in">
                                <input className="w-full bg-white dark:bg-stone-900 border border-stone-100 dark:border-stone-700 rounded-xl px-4 py-3 text-xs font-bold outline-none focus:border-teal-400" placeholder="제목" value={wBoardForm.title} onChange={e => setWBoardForm({...wBoardForm, title: e.target.value})}/>
                                <textarea className="w-full bg-white dark:bg-stone-900 border border-stone-100 dark:border-stone-700 rounded-xl px-4 py-3 text-xs font-bold outline-none focus:border-teal-400 h-24 resize-none" placeholder="내용" value={wBoardForm.content} onChange={e => setWBoardForm({...wBoardForm, content: e.target.value})}/>
                                <label className="flex items-center gap-2 cursor-pointer bg-white dark:bg-stone-900 border border-dashed border-stone-300 dark:border-stone-600 rounded-xl px-4 py-2.5 btn-press hover:bg-stone-50 transition-colors">
                                    <Icon name="camera" size={14} className="text-stone-400"/><span className="text-[11px] font-bold text-stone-400">{wBoardForm.photo ? '사진 변경' : '사진 첨부 (선택)'}</span>
                                    <input type="file" accept="image/*" className="hidden" onChange={async e => { if(e.target.files[0]) { const b64 = await resizeImage(e.target.files[0]); setWBoardForm(prev => ({...prev, photo: b64})); e.target.value=''; }}}/>
                                </label>
                                {wBoardForm.photo && <div className="relative w-16 h-16"><img src={wBoardForm.photo} className="w-full h-full object-cover rounded-xl border"/><button onClick={() => setWBoardForm(p=>({...p,photo:''}))} className="absolute -top-1.5 -right-1.5 bg-rose-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-[10px] font-black">×</button></div>}
                                <div className="flex gap-2">
                                    <button onClick={() => { setWBoardOpenId(null); setWBoardEditId(null); setWBoardForm({title:'',content:'',photo:''}); }} className="flex-1 bg-stone-200 dark:bg-stone-700 text-stone-500 font-black py-2.5 rounded-xl btn-press text-xs">취소</button>
                                    <button onClick={() => handleSaveWidgetPost(app.id)} className="flex-1 bg-teal-600 text-white font-black py-2.5 rounded-xl btn-press text-xs">{wBoardEditId ? '수정 완료' : '등록'}</button>
                                </div>
                            </div>
                        )}
