        const resizeImage = (file, maxBytes = 300000) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let MAX_WIDTH_OR_HEIGHT = 1920;
                        let width = img.width; let height = img.height;

                        const calculateSize = (w, h) => {
                            if (w > h && w > MAX_WIDTH_OR_HEIGHT) { h *= MAX_WIDTH_OR_HEIGHT / w; w = MAX_WIDTH_OR_HEIGHT; }
                            else if (h > MAX_WIDTH_OR_HEIGHT) { w *= MAX_WIDTH_OR_HEIGHT / h; h = MAX_WIDTH_OR_HEIGHT; }
                            return { w, h };
                        };

                        let { w, h } = calculateSize(width, height);
                        let quality = 0.85;

                        const compress = () => {
                            canvas.width = w; canvas.height = h;
                            const ctx = canvas.getContext('2d');
                            ctx.imageSmoothingQuality = 'high';
                            ctx.drawImage(img, 0, 0, w, h);

                            const dataUrl = canvas.toDataURL('image/jpeg', quality);

                            if (dataUrl.length > maxBytes) {
                                if (quality > 0.4) {
                                    quality -= 0.1;
                                    compress();
                                } else {
                                    MAX_WIDTH_OR_HEIGHT *= 0.8;
                                    let newSize = calculateSize(img.width, img.height);
                                    w = newSize.w; h = newSize.h;
                                    quality = 0.7;
                                    compress();
                                }
                            } else {
                                resolve(dataUrl);
                            }
                        };
                        compress();
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            });
        };

        const RouletteWheel = ({ names, rotation }) => {
            const n = names.length;
            if (!n) return null;
            const size = 260, cx = size / 2, cy = size / 2, r = size / 2 - 6;
            const COLORS = ['#0d9488', '#f43f5e', '#f59e0b', '#6366f1', '#10b981', '#8b5cf6', '#f97316', '#06b6d4', '#84cc16', '#ec4899', '#14b8a6', '#a855f7'];
            const angle = (2 * Math.PI) / n;
            const sectors = names.map((name, i) => {
                const s = i * angle - Math.PI / 2, e = s + angle;
                const x1 = cx + r * Math.cos(s), y1 = cy + r * Math.sin(s), x2 = cx + r * Math.cos(e), y2 = cy + r * Math.sin(e);
                const mid = s + angle / 2, tr = r * 0.60;
                return { path: `M${cx},${cy}L${x1},${y1}A${r},${r},0,${angle > Math.PI ? 1 : 0},1,${x2},${y2}Z`, color: COLORS[i % COLORS.length], tx: cx + tr * Math.cos(mid), ty: cy + tr * Math.sin(mid), rot: (mid * 180 / Math.PI) + 90, label: name.length > 5 ? name.slice(0, 5) : name };
            });
            return (
                <div className="relative inline-flex flex-col items-center">
                    <div className="absolute -top-3 left-1/2 z-10 -translate-x-1/2">
                        <div className="w-0 h-0 border-l-[11px] border-r-[11px] border-t-[18px] border-l-transparent border-r-transparent border-t-amber-400 drop-shadow" />
                    </div>
                    <svg width={size} height={size} style={{ transform: `rotate(${rotation}deg)`, transition: 'transform 4s cubic-bezier(0.17,0.67,0.12,0.99)' }}>
                        {sectors.map((s, i) => (
                            <g key={i}>
                                <path d={s.path} fill={s.color} stroke="rgba(255,255,255,0.4)" strokeWidth="1.5" />
                                {n <= 20 && <text x={s.tx} y={s.ty} textAnchor="middle" dominantBaseline="middle" fill="white" fontSize={n > 12 ? 7 : 9} fontWeight="900" transform={`rotate(${s.rot},${s.tx},${s.ty})`}>{s.label}</text>}
                            </g>
                        ))}
                        <circle cx={cx} cy={cy} r={16} fill="white" stroke="#e2e8f0" strokeWidth="3" />
                        <circle cx={cx} cy={cy} r={9} fill="#0d9488" />
                    </svg>
                </div>
            );

                                                        {field.label}
                                                    </label>
                                                    
                                                    {field.type === 'textarea' ? (
                                                        <textarea 
                                                            className="w-full bg-white dark:bg-stone-800 border border-stone-100 dark:border-stone-700 rounded-2xl p-4 text-xs font-bold shadow-inner outline-none h-28 resize-none focus:border-indigo-400"
                                                            placeholder={`${field.label} лВімЪ©мЭД мЮЕл†•нХШмДЄмЪФ.`}
                                                            value={submitFormState[field.id] || ''} 
                                                            onChange={e => setSubmitFormState({ ...submitFormState, [field.id]: e.target.value })}
                                                        />
                                                    ) : (
                                                        <input 
                                                            type={field.type}
                                                            className="w-full bg-white dark:bg-stone-800 border border-stone-100 dark:border-stone-700 rounded-2xl p-4 text-xs font-bold shadow-inner outline-none focus:border-indigo-400"
                                                            placeholder={`${field.label} мЮЕл†•`}
                                                            value={submitFormState[field.id] || ''} 
                                                            onChange={e => setSubmitFormState({ ...submitFormState, [field.id]: e.target.value })}
                                                        />
                                                    )}
                                                </div>
                                            ))}

                                            {/* 2. нХШлЛ® л≤ДнКЉ л∞П мВђмІД м≤®лґА (мЭі лґАлґДмЭА мЬ†мІА) */}
                                            <div className="flex gap-2 mt-2">
                                                <label className="flex-1 bg-stone-100 dark:bg-stone-800 text-stone-500 font-black py-4 rounded-2xl flex items-center justify-center gap-1.5 cursor-pointer btn-press text-[12px]">
                                                    <Icon name="camera" size={16} /> 
                                                    {submitFormState.photo ? 'мВђмІД л≥Ак≤љ' : 'мВђмІД м≤®лґА'}
                                                    <input type="file" className="hidden" accept="image/*" onChange={(e) => handlePhotoSingle(e, setSubmitFormState)} />
                                                </label>
                                                <button 
                                                    onClick={() => { handleGenericPostSubmit(); setOpenedSubmitForm(null); }} 
                                                    className="w-24 bg-stone-800 text-white font-black py-4 rounded-2xl shadow-md btn-press text-[12px]"
                                                >
                                                    м†СмИШ
                                                </button>
                                            </div>
                                            
                                            {/* мВђмІД лѓЄл¶ђл≥ікЄ∞ */}
                                            {submitFormState.photo && <img src={submitFormState.photo} className="w-full h-32 rounded-2xl object-cover border border-stone-200 dark:border-stone-700 mt-2 shadow-sm" />}
                                        </>
                                    ) : (<div className="text-center"><p className="text-[11px] font-bold text-stone-400 bg-stone-50 dark:bg-stone-800 py-4 rounded-xl border border-stone-100 dark:border-stone-700">{writeBlockedMsg(openedSubmitForm)}</p></div>)}
                                </div>
                            </ModalWrapper>
                        )
                    }

                    {
                        openedAdminBoard && (
                            <ModalWrapper title={openedAdminBoard.name} icon={openedAdminBoard.icon} color={openedAdminBoard.color} onClose={() => { setOpenedAdminBoard(null); setSelectedAdminPost(null); }}>
                                <div className="overflow-y-auto scrollbar-hide flex-1 pb-2">
                                    {canWrite(openedAdminBoard) && !selectedAdminPost && (
                                        <div className="bg-white dark:bg-stone-800 rounded-[2rem] border border-stone-200 dark:border-stone-700 p-5 mb-5 space-y-3 shadow-sm">
                                            <p className="text-[11px] font-black text-indigo-600 flex items-center gap-1.5"><Icon name="edit" size={14} /> к≥µмІА/мЮРл£М лУ±л°Э</p>
                                            <input className="w-full bg-stone-50 dark:bg-stone-900 border border-stone-100 dark:border-stone-700 rounded-2xl px-4 py-3 text-xs font-bold shadow-inner outline-none focus:border-indigo-400" placeholder="м†Ьл™©" value={adminBoardForm.title} onChange={e => setAdminBoardForm({ ...adminBoardForm, title: e.target.value })} />
                                            <textarea className="w-full bg-stone-50 dark:bg-stone-900 border border-stone-100 dark:border-stone-700 rounded-2xl p-4 text-xs font-bold shadow-inner outline-none h-24 resize-none" placeholder="лВімЪ©" value={adminBoardForm.content} onChange={e => setAdminBoardForm({ ...adminBoardForm, content: e.target.value })} />
                                            <label className="flex items-center gap-2 cursor-pointer bg-stone-50 dark:bg-stone-900 border border-dashed border-stone-300 dark:border-stone-600 rounded-xl px-4 py-2.5 btn-press hover:bg-stone-100 transition-colors">
                                                <Icon name="camera" size={14} className="text-stone-400" /><span className="text-[11px] font-bold text-stone-400">{adminBoardForm.photos && adminBoardForm.photos.length > 0 ? 'мВђмІД л≥Ак≤љ' : 'мВђмІД м≤®лґА (мД†нГЭ)'}</span>
                                                <input type="file" accept="image/*" className="hidden" onChange={async e => { if (e.target.files[0]) { const b64 = await resizeImage(e.target.files[0]); setAdminBoardForm(prev => ({ ...prev, photos: [b64] })); e.target.value = ''; } }} />
                                            </label>
                                            {adminBoardForm.photos && adminBoardForm.photos.length > 0 && <div className="relative w-16 h-16"><img src={adminBoardForm.photos[0]} className="w-full h-full object-cover rounded-xl border" /><button onClick={() => setAdminBoardForm(p => ({ ...p, photos: [] }))} className="absolute -top-1.5 -right-1.5 bg-rose-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-[10px] font-black">√Ч</button></div>}
                                            <div className="flex gap-2"><button onClick={() => handleAdminBoardPost(openedAdminBoard.id)} className="w-full bg-indigo-600 text-white font-black py-3 rounded-2xl shadow-md btn-press text-[11px]">к≤МмЛЬкЄА лУ±л°Э</button></div>
                                        </div>
                                    )}
                                    {selectedAdminPost ? (
                                        <div className="bg-white dark:bg-stone-800 rounded-[2rem] border border-stone-200 dark:border-stone-700 p-6 shadow-sm space-y-4 fade-in">
                                            <h4 className="text-[16px] font-black text-stone-800 dark:text-stone-200">{selectedAdminPost.title}</h4><p className="text-[10px] text-stone-400 font-bold mt-1">{selectedAdminPost.author} ¬Ј {formatLocalTime(selectedAdminPost.createdAt)}</p>
                                            {selectedAdminPost.photos && Array.isArray(selectedAdminPost.photos) && selectedAdminPost.photos.length > 0 && selectedAdminPost.photos.map((ph, i) => (
                                                <img key={i} src={ph} className="w-full h-auto rounded-2xl object-cover cursor-pointer mb-1" onClick={() => setExpandedImage(ph)} />
                                            ))}
                                            <div className="border-t border-stone-100 dark:border-stone-700 pt-4"><p className="text-[13px] font-bold text-stone-700 dark:text-stone-300 whitespace-pre-wrap">{selectedAdminPost.content}</p></div>
                                            <button onClick={() => setSelectedAdminPost(null)} className="w-full bg-stone-100 dark:bg-stone-700 text-stone-500 dark:text-stone-300 font-black py-3 rounded-2xl btn-press text-[11px]">л™©л°ЭмЬЉл°Ь</button>
                                        </div>
                                    ) : (
                                        <div className="space-y-3">
                                            {(dynamicPosts || []).filter(p => p.appId === openedAdminBoard.id).length === 0 && (<div className="text-center py-10 bg-white dark:bg-stone-900 rounded-3xl border border-dashed border-stone-200 dark:border-stone-700"><p className="text-[11px] font-bold text-stone-400">лУ±л°ЭлРЬ к≤МмЛЬкЄАмЭі мЧЖмКµлЛИлЛ§.</p></div>)}
                                            {(dynamicPosts || []).filter(p => p.appId === openedAdminBoard.id).map(post => {
                                                const isUnread = !readPostIds.includes(post.id);
                                                return (
                                                    <div key={post.id} className="flex items-center justify-between bg-white dark:bg-stone-800 p-4 rounded-2xl border border-stone-100 dark:border-stone-700 shadow-sm group hover:border-indigo-200 transition-colors relative" onClick={() => { if (isUnread) { const next = [...readNoticeIds, post.id]; setReadNoticeIds(next); localStorage.setItem('hmood_read_notices', JSON.stringify(next)); } }}>
                                                        {isUnread && <div className="absolute -top-1 -right-1 w-2.5 h-2.5 bg-rose-500 rounded-full shadow-sm"></div>}
                                                        <button onClick={() => setSelectedAdminPost(post)} className="flex-1 text-left btn-press"><p className="text-[13px] font-black text-stone-800 dark:text-stone-200 truncate group-hover:text-indigo-600">{post.title}</p><p className="text-[10px] text-stone-400 font-bold mt-1">{post.author} ¬Ј {formatLocalTime(post.createdAt)}</p></button>
                                                        {canDelete(openedAdminBoard) && (<button onClick={(e) => handleDeleteDynamicPost(e, post.id)} className="text-white bg-rose-400 hover:bg-rose-500 p-2 rounded-lg ml-2 btn-press shadow-sm z-10"><Icon name="trash" size={14} /></button>)}
                                                    </div>
                                                )
                                            })}
                                        </div>
                                    )}
                                </div>
                            </ModalWrapper>
                        )
                    }

                    {
                        showExtModal && (
                            <ModalWrapper title="лВімД†л≤ИнШЄ нЖµнХ© м°∞нЪМ" icon="phoneForwarded" color="text-teal-500" onClose={() => setShowExtModal(false)}>
                                <div className="bg-white dark:bg-stone-900 border border-stone-200 dark:border-stone-800 rounded-2xl flex items-center gap-2 px-4 py-3 shadow-sm mb-4"><Icon name="search" size={16} className="text-stone-400 shrink-0" /><input type="text" placeholder="л≤ИнШЄ, мЄµ, мВђмЪ©мЮР к≤АмГЙ..." value={extSearch} onChange={(e) => setExtSearch(e.target.value)} className="w-full bg-transparent outline-none text-[13px] font-bold text-stone-700 dark:text-stone-300 placeholder-stone-400" /></div>
                                <div className="overflow-y-auto scrollbar-hide flex-1 space-y-4 pb-2 pr-1">
                                    <div className="bg-rose-50 dark:bg-rose-900/20 p-4 rounded-2xl border border-rose-200 dark:border-rose-800 flex justify-between items-center cursor-pointer btn-press hover:bg-rose-100 dark:hover:bg-rose-900/40 transition-colors" onClick={(e) => callExtension('6112', 'л©імДЄл≥імХИ (мХИм†ДмЛ§)', e)}><div className="flex flex-col ml-3"><span className="text-[14px] font-black text-rose-700 dark:text-rose-400">л©імДЄл≥імХИ (мХИм†ДмЛ§)</span><span className="text-[10px] font-bold text-rose-500 mt-0.5">кЄікЄЙ мЧ∞лЭљм≤Ш к≥†м†Х</span></div><button className="text-[14px] font-black text-white bg-rose-500 px-4 py-2.5 rounded-xl shadow-sm flex items-center gap-2"><Icon name="phoneCall" size={16} /> 6112</button></div>
                                    <h4 className="text-[11px] font-black text-stone-400 tracking-widest mb-3 pt-2">м†Дм≤і мЧ∞лЭљм≤Ш</h4>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                        {filteredExtensions.map(ext => (
                                            <div key={ext.id} className="bg-white dark:bg-stone-900 p-4 rounded-2xl border border-stone-100 dark:border-stone-800 shadow-sm flex justify-between items-center cursor-pointer hover:border-teal-200 transition-colors" onClick={(e) => callExtension(ext?.number, ext?.user, e)}>
                                                <div className="flex items-center gap-3"><button onClick={(e) => { e.stopPropagation(); toggleFavExt(ext.id); }} className={`${favoriteExts.includes(ext.id) ? 'text-amber-400' : 'text-stone-300'} hover:scale-110 transition-all`}><Icon name={favoriteExts.includes(ext.id) ? 'starFilled' : 'star'} size={20} /></button><div className="flex flex-col"><span className="text-[14px] font-black text-stone-700 dark:text-stone-300">{ext?.user}</span><span className="text-[11px] font-bold text-stone-400 mt-0.5">{ext?.floor}</span></div></div>
                                                <button className="text-[13px] font-black text-stone-600 dark:text-stone-300 bg-stone-50 dark:bg-stone-800 px-4 py-2.5 rounded-xl btn-press border border-stone-200 dark:border-stone-700 flex items-center gap-2"><Icon name="phoneCall" size={14} /> {ext?.number}</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </ModalWrapper>
                        )
                    }

                    {
                        confirmDialog.isOpen && (
                            <div className="fixed inset-0 z-[400] flex items-center justify-center p-4 bg-stone-900/80 backdrop-blur-sm fade-in">
                                <div className="bg-white dark:bg-stone-800 w-full max-w-sm rounded-[3rem] p-8 shadow-2xl text-center">
                                    <p className="text-[14px] font-black text-stone-600 dark:text-stone-300 whitespace-pre-wrap leading-relaxed mb-8 mt-4">{confirmDialog.message}</p>
                                    <div className="flex gap-3">
                                        <button onClick={confirmDialog.onCancel} className="flex-1 bg-stone-100 dark:bg-stone-700 text-stone-500 dark:text-stone-300 font-black py-4 rounded-2xl text-[13px] btn-press">мЈ®мЖМ</button>
                                        {confirmDialog.telHref ? (<a href={confirmDialog.telHref} onClick={confirmDialog.onCancel} className="flex-1 flex items-center justify-center bg-teal-600 text-white font-black py-4 rounded-2xl text-[13px] decoration-none btn-press">нЖµнЩФ мЧ∞к≤∞</a>) : (<button onClick={confirmDialog.onConfirm} className="flex-1 bg-stone-800 text-white font-black py-4 rounded-2xl text-[13px] btn-press">нЩХмЭЄ</button>)}
                                    </div>
                                </div>
                            </div>
                        )
                    }

                    {/* мЫФк∞Д мЕА лІРнТНмД† нМЭмЧЕ */}
                    {
                        expandedCell && (
                            <div className="fixed inset-0 z-[200]" onClick={() => setExpandedCell(null)}>
                                <div
                                    className="absolute z-[201] pointer-events-none"
                                    style={{
                                        left: Math.min(expandedCell.rect.left + expandedCell.rect.width / 2, window.innerWidth - 120),
                                        top: expandedCell.rect.bottom + 6,
                                        transform: 'translateX(-50%)'
                                    }}
                                >
                                    <div className={`px-3 py-2 rounded-xl shadow-xl text-[12px] font-black whitespace-nowrap border ${STATUS_THEME[expandedCell.status] || 'bg-stone-800 text-white border-stone-700'}`}
                                        style={STATUS_INLINE_STYLE[expandedCell.status] || {}}>
                                        {expandedCell.status}
                                    </div>
                                    <div className="w-2 h-2 mx-auto -mt-1 rotate-45 rounded-sm"
                                        style={{ background: 'inherit' }}
                                    />
                                </div>
                            </div>
                        )
                    }

                    {
                        expandedImage && (
                            <div className="fixed inset-0 z-[300] bg-black/90 flex items-center justify-center p-4 fade-in cursor-pointer" onClick={() => setExpandedImage(null)}>
                                <img src={expandedImage} className="max-w-full max-h-full rounded-2xl object-contain shadow-2xl cursor-auto" onClick={e => e.stopPropagation()} />
                                <button className="absolute top-6 right-6 text-white p-3 bg-white/20 hover:bg-white/40 rounded-full btn-press"><Icon name="x" size={28} /></button>
                            </div>
                        )
                    }

                    {
                        toast && (
                            <div className={`fixed top-24 left-1/2 -translate-x-1/2 z-[400] backdrop-blur-md px-10 py-5 rounded-[2rem] shadow-2xl font-black text-[13px] flex items-center gap-3 border ${toastError ? 'bg-rose-500/95 text-white border-rose-400' : 'bg-stone-800/95 text-white border-white/10'}`}>
                                <Icon name={toastError ? "alertCircle" : "checkCircle"} size={18} className={toastError ? "text-white" : "text-teal-400"} />
                                {toast}
                            </div>
                        )
                    }
                </div >
                {/* вЬЕ нШДмЮ• мЛ§мЛЬк∞Д к≥µмІАмВђнХ≠ нМЭмЧЕ мЩДл≤љ мИШм†Х (мЧРлЯђлВШлКФ renderBoard м†Ьк±∞) */}
                {showWidgetNoticesPopup && (
                    <ModalWrapper
                        title="нШДмЮ• мЛ§мЛЬк∞Д к≥µмІАмВђнХ≠"
                        icon="bellRing"
                        color="text-rose-500"
                        onClose={() => {
                            setShowWidgetNoticesPopup(false);
                            setOpenedDynamicApp(null);
                        }}
                    >
                        <div className="space-y-3 overflow-y-auto scrollbar-hide max-h-[60vh] pr-1">
                            {(notices || []).map(notice => {
                                const images = Array.isArray(notice.photos) ? notice.photos : (notice.photo ? [notice.photo] : []);
                                return (
                                    <div key={notice.id} className="bg-stone-50 dark:bg-stone-800 p-4 rounded-2xl border border-stone-100 dark:border-stone-700">
                                        <div className="flex justify-between items-start mb-2">
                                            <span className="text-[10px] text-stone-400 font-bold">{notice.author} ¬Ј {formatLocalTime(notice.createdAt)}</span>
                                        </div>
                                        <p className="text-[13px] font-bold text-stone-800 dark:text-stone-200 whitespace-pre-wrap">{notice.content}</p>
                                        {images.length > 0 && (
                                            <div className="mt-3 space-y-2">
                                                {images.map((img, i) => (
                                                    <img key={i} src={img} className="w-full rounded-xl border object-cover cursor-pointer" onClick={(e) => { e.stopPropagation(); setExpandedImage(img); }} />
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                            {(notices || []).length === 0 && (
                                <p className="text-[11px] text-center text-stone-400 py-6">лУ±л°ЭлРЬ к≥µмІАмВђнХ≠мЭі мЧЖмКµлЛИлЛ§.</p>
                            )}
                        </div>
                    </ModalWrapper>
                )}
            </>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>

</html>
